<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Didi - AI Teacher</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1e1e1e; --text: #e0e0e0; --blue: #1a73e8; --green: #28a745; --red: #dc3545; --tick: #4fc3f7; }
        .light-mode { --bg: #f5f5f5; --card: #ffffff; --text: #111111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        .chat-header { background: var(--card); padding: 12px 16px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .light-mode.chat-header { border-bottom: 1px solid #ddd; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .back-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .header-info h3 { font-size: 16px; }
        .header-info p { font-size: 12px; opacity: 0.7; }
        .theme-toggle { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
        .chat-body { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .light-mode.chat-body { background: #f5f5f5; }
        .user-msg { background: var(--blue); color: white; padding: 12px 16px; border-radius: 16px; max-width: 80%; line-height: 1.5; white-space: pre-wrap; align-self: flex-end; margin-left: auto; position: relative; padding-right: 32px; }
        .ai-msg { background: var(--card); color: var(--text); padding: 12px 16px; border-radius: 16px; max-width: 80%; line-height: 1.5; white-space: pre-wrap; align-self: flex-start; margin-right: auto; }
        .light-mode.ai-msg { background: #ffffff; color: #111111; border: 1px solid #dddddd; }
        .tick { position: absolute; bottom: 4px; right: 8px; font-size: 14px; color: var(--tick); }
        .quick-btns { display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto; background: var(--bg); }
        .quick-btns button { background: var(--card); border: 1px solid #333; color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .light-mode.quick-btns button { border: 1px solid #ddd; }
        .chat-input { display: flex; padding: 12px 16px; gap: 8px; background: var(--card); border-top: 1px solid #333; align-items: center; }
        .light-mode.chat-input { border-top: 1px solid #ddd; }
        #message-input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #333; background: var(--bg); color: var(--text); }
        .light-mode #message-input { border: 1px solid #ddd; background: #fff; }
        #send-btn { background: var(--blue); border: none; color: white; padding: 10px 16px; border-radius: 20px; cursor: pointer; }
        #mic-btn { background: var(--green); border: none; color: white; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 18px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: #2d2d2d; color: white; margin: 30% auto; padding: 20px; width: 85%; border-radius: 12px; text-align: center; position: relative; }
        .close { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; }
        .modal-btn { padding: 12px 20px; margin: 10px 5px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; width: 100%; }
        .modal-practice { background: #4CAF50; color: white; }
    </style>
</head>
<body>
    <!-- API Key Popup -->
    <div id="api-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeApiModal()">&times;</span>
            <h3>🔑 Groq API Key Daalo</h3>
            <p style="font-size:14px;margin:10px 0;color:#ccc;">https://console.groq.com/keys se free me banao</p>
            <input type="text" id="api-key-input" placeholder="gsk_xxxxx..." style="width:100%;padding:10px;border-radius:8px;border:1px solid #555;background:#111;color:#fff;margin:10px 0;">
            <button class="modal-btn modal-practice" onclick="saveApiKey()">Save & Chat Karo</button>
        </div>
    </div>

    <div class="chat-header">
        <div class="header-left">
            <button class="back-btn" onclick="window.location.href='ai-teacher.html'">←</button>
            <div class="avatar">👩‍🏫</div>
            <div class="header-info">
                <h3>Maya Didi</h3>
                <p>Online</p>
            </div>
        </div>
        <button class="theme-toggle" id="theme-toggle">☀️</button>
    </div>
    <div class="chat-body"></div>
    <div class="quick-btns"></div>
    <div class="chat-input">
        <button id="mic-btn">🎙️</button>
        <input type="text" id="message-input" placeholder="Message Maya Didi...">
        <button id="send-btn">Send</button>
    </div>

    <script>
        let API_KEY = localStorage.getItem('groq_api_key');
        if (!API_KEY) {
            document.getElementById('api-modal').style.display = 'block';
        }

        function closeApiModal() {
            document.getElementById('api-modal').style.display = 'none';
        }

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                localStorage.setItem('groq_api_key', key);
                API_KEY = key;
                closeApiModal();
                location.reload();
            } else {
                alert('API Key daalo bhai');
            }
        }

        const API_URL = "https://api.groq.com/openai/v1/chat/completions";
        const SYSTEM_PROMPT = `You are Maya Didi, a friendly Hindi-English teacher for Indian students. You help with English grammar, tense, vocabulary, speaking. Reply in Hinglish, friendly tone. Use examples. Keep it short and helpful.`;

        // ... (rest of the code same)
    </script>
</body>
</html>
