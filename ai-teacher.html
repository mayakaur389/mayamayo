<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Didi - AI Teacher</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1e1e1e; --text: #e0e0e0; --blue: #1a73e8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; }
      .hidden { display: none!important; }

        /* Home Page */
      .container { max-width: 500px; margin: 0 auto; padding: 16px; height: 100%; display: flex; flex-direction: column; justify-content: center; }
      .title { font-size: 28px; font-weight: 600; margin-bottom: 16px; text-align: center; }
      .btn { padding: 14px 24px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; margin: 8px 0; font-weight: 600; }

        /* API Modal */
      .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
      .modal-content { background: #2d2d2d; color: white; margin: 30% auto; padding: 20px; width: 85%; border-radius: 12px; text-align: center; position: relative; }
      .close { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; }
      .modal-btn { padding: 12px 20px; margin: 10px 5px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; width: 100%; background: #4CAF50; color: white; }

        /* Chat Page - Ye mayamayo.html ka code hai */
        #chat-page { height: 100vh; display: flex; flex-direction: column; }
      .chat-header { padding: 16px; background: var(--card); text-align: center; font-weight: 600; border-bottom: 1px solid #333; }
      .chat-box { flex: 1; overflow-y: auto; padding: 16px; }
      .msg { margin: 8px 0; padding: 10px 14px; border-radius: 12px; max-width: 80%; word-wrap: break-word; }
      .user-msg { background: var(--blue); color: white; margin-left: auto; }
      .ai-msg { background: var(--card); color: var(--text); }
      .input-area { display: flex; padding: 16px; background: var(--card); border-top: 1px solid #333; gap: 8px; }
      .input-area input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #555; background: #111; color: #fff; }
      .input-area button { padding: 12px 20px; background: var(--blue); color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <!-- Home Page -->
    <div id="home-page" class="container">
        <h1 class="title">Maya Didi 👩‍🏫</h1>
        <p style="text-align:center;opacity:0.8;margin-bottom:32px;">AI English Teacher for Indians</p>
        <button class="btn" onclick="startChat()">Maya Didi se Puchho</button>
    </div>

    <!-- Chat Page - Ye mayamayo.html tha -->
    <div id="chat-page" class="hidden">
        <div class="chat-header">Maya Didi 👩‍🏫 <span style="float:right;cursor:pointer;" onclick="goHome()">🏠</span></div>
        <div class="chat-box" id="chat-box">
            <div class="msg ai-msg">Namaste! Main Maya Didi hun. English sikhe? 🙋‍♀️</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Yahan likho..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>

    <!-- API Key Popup -->
    <div id="api-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeApiModal()">&times;</span>
            <h3>🔑 Groq API Key Daalo</h3>
            <p style="font-size:14px;margin:10px 0;color:#ccc;">https://console.groq.com/keys se free me banao</p>
            <input type="text" id="api-key-input" placeholder="gsk_xxxxx..." style="width:100%;padding:10px;border-radius:8px;border:1px solid #555;background:#111;color:#fff;margin:10px 0;">
            <button class="modal-btn" onclick="saveApiKey()">Save & Chat Karo</button>
        </div>
    </div>

    <script>
        function startChat() {
            if (!localStorage.getItem('groq_api_key')) {
                document.getElementById('api-modal').style.display = 'block';
            } else {
                showChatPage();
            }
        }

        function closeApiModal() {
            document.getElementById('api-modal').style.display = 'none';
        }

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                localStorage.setItem('groq_api_key', key);
                closeApiModal();
                showChatPage();
            } else {
                alert('API Key daalo bhai');
            }
        }

        function showChatPage() {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('chat-page').classList.remove('hidden');
        }

        function goHome() {
            document.getElementById('chat-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        async function sendMsg() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="msg user-msg">${msg}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const apiKey = localStorage.getItem('groq_api_key');

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            {role: 'system', content: 'You are Maya Didi, a friendly Indian English teacher. Reply in Hindi + English mix. Keep answers short and helpful.'},
                            {role: 'user', content: msg}
                        ],
                        temperature: 0.7
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                chatBox.innerHTML += `<div class="msg ai-msg">${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch(e) {
                chatBox.innerHTML += `<div class="msg ai-msg">Error: API key galat hai ya net nahi hai 😅</div>`;
            }
        }
    </script>
</body>
</html>
