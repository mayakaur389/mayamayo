<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Didi - AI Teacher</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1e1e1e; --text: #e0e0e0; --blue: #1a73e8; --green: #28a745; --red: #dc3545; --tick: #4fc3f7; }
       .light-mode { --bg: #f5f5f5; --card: #ffffff; --text: #111111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
       .chat-header { background: var(--card); padding: 12px 16px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
       .light-mode.chat-header { border-bottom: 1px solid #ddd; }
       .header-left { display: flex; align-items: center; gap: 10px; }
       .back-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
       .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 20px; }
       .header-info h3 { font-size: 16px; }
       .header-info p { font-size: 12px; opacity: 0.7; }
       .theme-toggle { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
       .chat-body { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
       .light-mode.chat-body { background: #f5f5f5; }
       .user-msg { background: var(--blue); color: white; padding: 12px 16px; border-radius: 16px; max-width: 80%; line-height: 1.5; white-space: pre-wrap; align-self: flex-end; margin-left: auto; position: relative; padding-right: 32px; }
       .ai-msg { background: var(--card); color: var(--text); padding: 12px 16px; border-radius: 16px; max-width: 80%; line-height: 1.5; white-space: pre-wrap; align-self: flex-start; margin-right: auto; }
       .light-mode.ai-msg { background: #ffffff; color: #111111; border: 1px solid #dddddd; }
       .light-mode.user-msg { background: #1a73e8; color: #ffffff; }
       .tick { position: absolute; bottom: 4px; right: 8px; font-size: 14px; color: var(--tick); }
       .quick-btns { display: flex; gap: 8px; padding: 0 16px 8px; overflow-x: auto; background: var(--bg); }
       .quick-btns button { background: var(--card); border: 1px solid #333; color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }
       .light-mode.quick-btns button { border: 1px solid #ddd; }
       .chat-input { display: flex; padding: 12px 16px; gap: 8px; background: var(--card); border-top: 1px solid #333; align-items: center; }
       .light-mode.chat-input { border-top: 1px solid #ddd; }
        #message-input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #333; background: var(--bg); color: var(--text); }
       .light-mode #message-input { border: 1px solid #ddd; background: #fff; }
        #send-btn { background: var(--blue); border: none; color: white; padding: 10px 16px; border-radius: 20px; cursor: pointer; }
        #mic-btn { background: var(--green); border: none; color: white; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 18px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="header-left">
            <button class="back-btn">←</button>
            <div class="avatar">👩‍🏫</div>
            <div class="header-info">
                <h3>Maya Didi</h3>
                <p>Online</p>
            </div>
        <button class="theme-toggle" id="theme-toggle">☀️</button>
    </div>

    <div class="chat-body"></div>
    <div class="quick-btns"></div>

    <div class="chat-input">
        <button id="mic-btn">🎙️</button>
        <input type="text" id="message-input" placeholder="Message Maya Didi...">
        <button id="send-btn">Send</button>
    </div>

<script>
let API_KEY = localStorage.getItem('groq_api_key');
if (!API_KEY) {
    API_KEY = prompt("Groq API Key daalo bhai 🔑\n\nhttps://console.groq.com/keys se free me banao");
    if (API_KEY) {
        localStorage.setItem('groq_api_key', API_KEY.trim());
    }
}

const API_URL = "https://api.groq.com/openai/v1/chat/completions";
const SYSTEM_PROMPT = `You are Maya Didi, a friendly Hindi-English teacher for Indian students.
You help with English grammar, tense, vocabulary, speaking.
Reply in Hinglish, friendly tone. Use examples. Keep it short and helpful.`;

async function sendMessage(userMessage) {
    if (!API_KEY) return "Bhai key nahi mili. Page refresh karke key daalo.";
    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${API_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                "model": "llama-3.1-8b-instant",
                "messages": [
                    {"role": "system", "content": SYSTEM_PROMPT},
                    {"role": "user", "content": userMessage}
                ],
                "temperature": 0.7,
                "max_tokens": 500
            })
        });
        if (!response.ok) throw new Error(`API Error: ${response.status}`);
        const data = await response.json();
        return data.choices[0].message.content;
    } catch (error) {
        console.error("Error:", error);
        return "Sorry yaar, abhi Maya Didi busy hai 😅 Thodi der baad try karna.";
    }
}

const chatBody = document.querySelector('.chat-body');
const inputField = document.querySelector('#message-input');
const sendBtn = document.querySelector('#send-btn');
const quickBtns = document.querySelector('.quick-btns');
const themeToggle = document.querySelector('#theme-toggle');
const micBtn = document.querySelector('#mic-btn');

const quickQuestions = ["English grammar rules", "Tense explain karo", "Vocabulary words", "Conversation practice"];
quickQuestions.forEach(q => {
    const btn = document.createElement('button');
    btn.textContent = q;
    btn.onclick = () => {
        const msgDiv = sendMessageToUI(q);
        sendMessage(q).then(response => {
            sendMessageToUI(response, 'ai');
            updateTick(msgDiv);
        });
    };
    quickBtns.appendChild(btn);
});

let isLightMode = localStorage.getItem('lightMode') === 'true';
if (isLightMode) {
    document.body.classList.add('light-mode');
    themeToggle.textContent = '🌙';
}

themeToggle.onclick = () => {
    isLightMode =!isLightMode;
    document.body.classList.toggle('light-mode');
    themeToggle.textContent = isLightMode? '🌙' : '☀️';
    localStorage.setItem('lightMode', isLightMode);
};

function sendMessageToUI(message, type = 'user') {
    const msgDiv = document.createElement('div');
    msgDiv.className = type === 'user'? 'user-msg' : 'ai-msg';
    if(type === 'user') {
        msgDiv.innerHTML = `${message}<span class="tick">✓</span>`;
    } else {
        msgDiv.textContent = message;
    }
    chatBody.appendChild(msgDiv);
    chatBody.scrollTop = chatBody.scrollHeight;
    return msgDiv;
}

function updateTick(msgDiv) {
    const tick = msgDiv.querySelector('.tick');
    if(tick) tick.textContent = '✓✓';
}

sendBtn.onclick = () => {
    const message = inputField.value.trim();
    if (!message) return;
    const msgDiv = sendMessageToUI(message);
    inputField.value = '';
    sendMessage(message).then(response => {
        sendMessageToUI(response, 'ai');
        updateTick(msgDiv);
    });
};

inputField.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendBtn.click();
});

if ('webkitSpeechRecognition' in window) {
    const recognition = new webkitSpeechRecognition();
    recognition.lang = 'hi-IN';
    recognition.continuous = false;
    micBtn.onclick = () => {
        recognition.start();
        micBtn.textContent = '🔴';
        micBtn.style.background = 'var(--red)';
    };
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        inputField.value = transcript;
        micBtn.textContent = '🎙️';
        micBtn.style.background = 'var(--green)';
    };
    recognition.onerror = () => {
        micBtn.textContent = '🎙️';
        micBtn.style.background = 'var(--green)';
    };
    recognition.onend = () => {
        micBtn.textContent = '🎙️';
        micBtn.style.background = 'var(--green)';
    };
} else {
    micBtn.style.display = 'none';
}

setTimeout(() => {
    sendMessage('Hii').then(response => sendMessageToUI(response, 'ai'));
}, 500);
</script>
</body>
</html>
