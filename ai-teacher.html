<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Didi Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-page">
        <div class="chat-header">Maya Didi 👩‍🏫 <span style="float:right;cursor:pointer;" onclick="goHome()">🏠</span></div>
        <div class="chat-box" id="chat-box">
            <div class="msg ai-msg">Namaste! Main Maya Didi hun. English sikhe? 🙋‍♀️</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Yahan likho..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>

    <!-- API Key Popup -->
    <div id="api-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeApiModal()">&times;</span>
            <h3>🔑 Groq API Key Daalo</h3>
            <input type="text" id="api-key-input" placeholder="gsk_xxxxx..." style="width:100%;padding:10px;border-radius:8px;border:1px solid #555;background:#111;color:#fff;margin:10px 0;">
            <button class="modal-btn" onclick="saveApiKey()">Save & Chat Karo</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            if (!localStorage.getItem('groq_api_key')) {
                document.getElementById('api-modal').style.display = 'block';
            }
        }
        function closeApiModal() { document.getElementById('api-modal').style.display = 'none'; }
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                localStorage.setItem('groq_api_key', key);
                closeApiModal();
            }
        }
        function goHome() { window.location.href = 'index.html'; }
        async function sendMsg() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="msg user-msg">${msg}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
            const apiKey = localStorage.getItem('groq_api_key');
            if(!apiKey) {
                document.getElementById('api-modal').style.display = 'block';
                return;
            }
            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            {role: 'system', content: 'You are Maya Didi, a friendly Indian English teacher. Reply in Hindi + English mix.'},
                            {role: 'user', content: msg}
                        ]
                    })
                });
                const data = await res.json();
                chatBox.innerHTML += `<div class="msg ai-msg">${data.choices[0].message.content}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch(e) {
                chatBox.innerHTML += `<div class="msg ai-msg">Error: API key galat hai 😅</div>`;
            }
        }
    </script>
</body>
</html>
