<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Didi - AI Teacher</title>
    <link rel="stylesheet" href="style.css">
    <style>
       .chat-header {
            background: var(--blue);
            padding: 16px;
            margin: -16px -16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
       .back-btn {
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }
       .chat-title {
            font-size: 18px;
            font-weight: 600;
        }
       .chat-container {
            padding: 16px;
            height: calc(100vh - 180px);
            overflow-y: auto;
        }
       .msg {
            margin: 12px 0;
            display: flex;
            gap: 8px;
        }
       .msg.ai { justify-content: flex-start; }
       .msg.user { justify-content: flex-end; }
       .msg-bubble {
            background: var(--card);
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            line-height: 1.5;
            white-space: pre-wrap;
        }
       .msg.user.msg-bubble {
            background: var(--blue);
            color: white;
        }
       .light-mode.msg-bubble {
            background: #fff;
            border: 1px solid #ddd;
            color: #111;
        }
       .light-mode.msg.user.msg-bubble {
            background: var(--blue);
            color: white;
        }
       .typing {
            opacity: 0.7;
            font-style: italic;
        }
       .chat-input {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            background: var(--bg);
            display: flex;
            gap: 8px;
        }
       .light-mode.chat-input { background: #f5f5f5; }
       .chat-input input {
            flex: 1;
            background: var(--card);
            border: none;
            padding: 14px;
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
        }
       .light-mode.chat-input input {
            background: #fff;
            border: 1px solid #ddd;
            color: #111;
        }
       .send-btn,.mic-btn {
            background: var(--blue);
            border: none;
            color: white;
            padding: 0 16px;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
        }
       .quick-btns {
            display: flex;
            gap: 8px;
            padding: 0 16px 8px;
            overflow-x: auto;
        }
       .quick-btn {
            background: var(--card);
            border: 1px solid var(--lock);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
        }
       .light-mode.quick-btn {
            background: #fff;
            border: 1px solid #ddd;
            color: #111;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <div class="chat-title">💬 Maya Didi</div>
        <div class="stats">
            <button id="theme-toggle" class="theme-btn">🌙</button>
        </div>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="msg ai">
            <div class="msg-bubble">
Hey! Main Maya Didi hoon 😊 Teri personal AI teacher.

Mujhse puch sakte ho:
1. Koi doubt samjha do
2. Topic explain kar do
3. Practice questions banao
4. Motivation chahiye

Bolo kya help karu?
            </div>
        </div>
    </div>

    <div class="quick-btns">
        <button class="quick-btn" onclick="quickAsk('Present Tense samjhao')">Tense samjhao</button>
        <button class="quick-btn" onclick="quickAsk('Noun ke 5 questions do')">Quiz banao</button>
        <button class="quick-btn" onclick="quickAsk('Padhai me mann nahi lagta')">Motivate karo</button>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Message likho ya doubt pucho...">
        <button class="mic-btn" onclick="startVoice()">🎤</button>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <script>
        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            document.getElementById('theme-toggle').textContent =
                document.body.classList.contains('light-mode')? '☀️' : '🌙';
        });

        // GEMINI API KEY YAHI DALNA - Google AI Studio se le aao
        const GEMINI_API_KEY = 'AIzaSyDtqiNCpbbKl_xvl2T96yYOZWe0kW7AoIw';

        // Maya Didi ka character
        const SYSTEM_PROMPT = `Tum Maya Didi ho. Ek dostana, funny, helpful AI teacher ho jo class 6-10 ke bacchon ko English aur Maths padhati hai.

        Rules:
        1. Hamesha Hinglish me baat karo. Hindi + English mix.
        2. Chote bacche ki tarah simple explain karo. Bade words mat use karo.
        3. Example bahut do. Real life se jod ke samjhao.
        4. Motivating raho. Bacche ko darana nahi hai.
        5. Har answer ke end me 1 chota sa sawal pucho ya practice do.
        6. Agar galat bole to pyar se correct karo, daanto mat.
        7. Emojis use karo taki chat mazedaar lage 😊`;

        let chatHistory = [];

        function quickAsk(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'user');
            input.value = '';

            // Typing indicator
            const typingId = addMessage('Maya Didi soch rahi hai...', 'ai typing');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [
                            {
                                role: "user",
                                parts: [{ text: SYSTEM_PROMPT + "\n\nUser ka sawal: " + msg }]
                            }
                        ],
                        generationConfig: {
                            temperature: 0.9,
                            maxOutputTokens: 300
                        }
                    })
                });

                const data = await response.json();
                document.getElementById(typingId).remove();

                if(data.candidates && data.candidates[0]) {
                    const reply = data.candidates[0].content.parts[0].text;
                    addMessage(reply, 'ai');
                    chatHistory.push({role: "user", content: msg});
                    chatHistory.push({role: "assistant", content: reply});
                } else {
                    addMessage('Sorry yaar, abhi Maya Didi busy hai 😅 1 min baad try karo', 'ai');
                }
            } catch (e) {
                document.getElementById(typingId).remove();
                addMessage('Net slow hai ya API key galat hai. Google AI Studio se key check karo 💔', 'ai');
            }
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            const id = 'msg-' + Date.now();
            msgDiv.id = id;
            msgDiv.className = `msg ${sender}`;
            msgDiv.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        // Enter se send
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Voice Input
        function startVoice() {
            if (!('webkitSpeechRecognition' in window)) {
                alert('Tera browser voice support nahi karta 😢 Chrome me khol');
                return;
            }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
            };
            recognition.start();
        }
    </script>
</body>
</html>
