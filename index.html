<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maya Didi - English Learning</title>
  <style>
    :root{
      --bg:#f0f4f8;
      --card:#fff;
      --text:#1e293b;
      --text2:#64748b;
      --main:#3b82f6;
      --main2:#2563eb;
      --green:#10b981;
      --orange:#f59e0b;
      --red:#ef4444;
      --opt:#e2e8f0;
      --done:#10b981;
    }
    [data-theme="dark"]{
      --bg:#0f172a;
      --card:#1e293b;
      --text:#f1f5f9;
      --text2:#94a3b8;
      --main:#60a5fa;
      --main2:#3b82f6;
      --green:#34d399;
      --orange:#fbbf24;
      --red:#f87171;
      --opt:#334155;
      --done:#10b981;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
    body{background:var(--bg);color:var(--text);min-height:100vh;transition:.3s}
  .header{background:var(--main);color:#fff;padding:16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .header span{font-size:20px;font-weight:700}
  .stats{display:flex;gap:12px;align-items:center}
  .stats span{font-weight:600;font-size:14px}
  .icon-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer}
  .container{max-width:600px;margin:0 auto;padding:20px}
  .card{background:var(--card);border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
  .btn{width:100%;padding:16px;border:none;border-radius:16px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:.2s}
  .btn:active{transform:scale(.98)}
  .btn-main{background:var(--main);color:#fff}
  .btn-voice{background:var(--green);color:#fff}
  .btn-practice{background:var(--orange);color:#fff}
  .btn-opt{background:var(--opt);color:var(--text);text-align:left}
  .btn-opt.correct{background:var(--green);color:#fff}
  .btn-opt.wrong{background:var(--red);color:#fff}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .stat{background:var(--opt);padding:16px;border-radius:16px;text-align:center}
  .stat-label{font-size:12px;color:var(--text2);margin-bottom:4px}
  .stat-value{font-size:24px;font-weight:700;color:var(--main)}
  .day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:16px}
  .day-btn{
     aspect-ratio:1;
     background:var(--opt);
     border:none;
     border-radius:12px;
     font-weight:700;
     cursor:pointer;
     position:relative;
     transition:.2s;
     display:flex;
     flex-direction:column;
     align-items:center;
     justify-content:center;
     font-size:14px;
     color:var(--text);
     padding:4px;
   }
  .day-btn:active{transform:scale(.95)}
  .day-btn b{font-size:16px}
  .day-btn small{
     font-size:9px;
     font-weight:600;
     margin-top:1px;
     line-height:1;
     white-space:nowrap;
     overflow:hidden;
     text-overflow:ellipsis;
     max-width:100%;
   }
  .screen{display:none}
  .screen:first-child{display:block}
  .progress-wrap{background:var(--opt);height:8px;border-radius:4px;margin-bottom:20px;overflow:hidden}
  .progress-bar{background:var(--green);height:100%;transition:width.3s}
  .question{font-size:20px;font-weight:600;margin-bottom:8px}
  .hindi{color:var(--text2);margin-bottom:20px;font-size:15px}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  .feedback{font-size:18px;font-weight:600;margin:16px 0;text-align:center;min-height:24px}
  .grammar{background:var(--opt);padding:16px;border-radius:12px;margin-bottom:16px;font-size:14px;color:var(--text2)}
  .grammar b{color:var(--text)}
  .hidden{display:none!important}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000}
  .modal-content{background:var(--card);padding:24px;border-radius:20px;max-width:90%;width:340px}
  .chat-msg{padding:12px;border-radius:12px;margin-bottom:12px;max-width:85%;word-wrap:break-word}
  .user-msg{background:var(--main);color:#fff;margin-left:auto}
  .ai-msg{background:var(--opt);color:var(--text)}
  .typing{display:flex;gap:4px;padding:12px}
  .typing span{width:8px;height:8px;background:var(--text2);border-radius:50%;animation:bounce 1.4s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
    input[type="text"]{width:100%;padding:14px;border:2px solid var(--opt);border-radius:12px;font-size:16px;background:var(--card);color:var(--text);margin-bottom:12px}
    input[type="text"]:focus{outline:none;border-color:var(--main)}
  </style>
</head>
<body>
  <div class="header">
    <span>Maya Didi</span>
    <div class="stats">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
      <span>🔥<span id="streak">0</span></span>
      <span>❤️<span id="hearts">5</span></span>
      <span>⚡<span id="xp">0</span></span>
    </div>
  </div>

  <div class="container">
    <!-- HOME SCREEN -->
    <div class="screen" id="homeScreen">
      <button class="btn btn-voice" onclick="showDoubtScreen()">💬 Maya Didi से पूछो</button>
      <button class="btn btn-practice" onclick="startPractice()">🔄 Practice गलत Questions</button>

      <div class="card">
        <div class="grid">
          <div class="stat">
            <div class="stat-label">Streak</div>
            <div class="stat-value" id="streakHome">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Hearts</div>
            <div class="stat-value" id="heartsHome">5</div>
          </div>
          <div class="stat">
            <div class="stat-label">XP</div>
            <div class="stat-value" id="xpHome">0</div>
          </div>
        </div>

        <h3 style="margin-top:20px;margin-bottom:8px;">UNIT 1: BASICS - 30 DAYS</h3>
        <p style="color:var(--text2);margin-bottom:16px;">Day चुनो। Done = हरा</p>

        <div class="day-grid" id="daysGrid"></div>
      </div>
    </div>

    <!-- DOUBT SCREEN -->
    <div class="screen" id="doubtScreen">
      <button class="btn btn-main" onclick="showScreen('homeScreen')" style="margin-bottom:16px;">← Back</button>
      <div class="card">
        <h3 style="margin-bottom:16px;">Maya Didi से पूछो 😊</h3>
        <div id="chatBox" style="max-height:400px;overflow-y:auto;margin-bottom:16px;"></div>
        <input type="text" id="doubtInput" placeholder="Apna doubt likho...">
        <button class="btn btn-main" onclick="askDoubt()">भेजो</button>
        <button class="btn btn-voice" onclick="askDoubtVoice()">🎤 बोल के पूछो</button>
      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div class="screen" id="quizScreen">
      <button class="btn btn-main" onclick="showScreen('homeScreen')" style="margin-bottom:16px;">← Back</button>
      <div class="card">
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>
        <p id="progressText" style="color:var(--text2);margin-bottom:16px;font-size:14px;">Question 1/3</p>

        <div class="question" id="questionText">Loading...</div>
        <div class="hindi" id="hindiText"></div>

        <div class="options" id="optionsBox"></div>

        <div class="feedback" id="feedback"></div>
        <div class="grammar hidden" id="grammarBox"></div>

        <button class="btn btn-main hidden" id="nextBtn" onclick="nextQuestion()">Next Question</button>
      </div>
    </div>
  </div>

<script>
let state = {
  streak: 0,
  hearts: 5,
  xp: 0,
  done: [],
  wrong: []
};

let chatHistory = [];
let currentDay = 0;
let currentQ = 0;
let quizData = [];

const LESSONS = [
  { day: 1, title: "I am", color: "#3b82f6" },
  { day: 2, title: "You are", color: "#3b82f6" },
  { day: 3, title: "He/She/It", color: "#3b82f6" },
  { day: 4, title: "We are", color: "#3b82f6" },
  { day: 5, title: "They are", color: "#3b82f6" },
  { day: 6, title: "Present", color: "#8b5cf6" },
  { day: 7, title: "Questions", color: "#8b5cf6" },
  { day: 8, title: "Negative", color: "#8b5cf6" },
  { day: 9, title: "Have/Has", color: "#8b5cf6" },
  { day: 10, title: "This/That", color: "#8b5cf6" },
  { day: 11, title: "Articles", color: "#ec4899" },
  { day: 12, title: "Plural", color: "#ec4899" },
  { day: 13, title: "My/Your", color: "#ec4899" },
  { day: 14, title: "His/Her", color: "#ec4899" },
  { day: 15, title: "Preposition", color: "#ec4899" },
  { day: 16, title: "Past Simple", color: "#f59e0b" },
  { day: 17, title: "Was/Were", color: "#f59e0b" },
  { day: 18, title: "Past Quest", color: "#f59e0b" },
  { day: 19, title: "Past Neg", color: "#f59e0b" },
  { day: 20, title: "Irregular", color: "#f59e0b" },
  { day: 21, title: "Future", color: "#10b981" },
  { day: 22, title: "Will Quest", color: "#10b981" },
  { day: 23, title: "Will Neg", color: "#10b981" },
  { day: 24, title: "Going to", color: "#10b981" },
  { day: 25, title: "Can/Could", color: "#10b981" },
  { day: 26, title: "Must/Should", color: "#06b6d4" },
  { day: 27, title: "May/Might", color: "#06b6d4" },
  { day: 28, title: "Comparative", color: "#06b6d4" },
  { day: 29, title: "Superlative", color: "#06b6d4" },
  { day: 30, title: "Final Test", color: "#ef4444" }
];

function loadState(){
  let saved = localStorage.getItem('mayaDidiState');
  if(saved){
    state = JSON.parse(saved);
  }
  updateStats();
}

function saveState(){
  localStorage.setItem('mayaDidiState', JSON.stringify(state));
}

function loadDays(){
  let grid = document.getElementById('daysGrid');
  if(!grid) return;
  grid.innerHTML = '';
  LESSONS.forEach(lesson => {
    let btn = document.createElement('button');
    btn.className = 'day-btn';

    if(state.done.includes(lesson.day)){
      btn.style.background = 'var(--done)';
      btn.style.color = '#fff';
    }else{
      btn.style.background = lesson.color + '20';
      btn.style.border = `2px solid ${lesson.color}`;
    }

    btn.innerHTML = `<b>${lesson.day}</b><small>${lesson.title}</small>`;
    btn.onclick = () => openDay(lesson.day);
    grid.appendChild(btn);
  });
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

function toggleTheme(){
  let html = document.documentElement;
  if(html.getAttribute('data-theme') === 'dark'){
    html.removeAttribute('data-theme');
    document.getElementById('themeBtn').textContent = '🌙';
  }else{
    html.setAttribute('data-theme','dark');
    document.getElementById('themeBtn').textContent = '☀️';
  }
}

function updateStats(){
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('hearts').textContent = state.hearts;
  document.getElementById('xp').textContent = state.xp;
  document.getElementById('streakHome').textContent = state.streak;
  document.getElementById('heartsHome').textContent = state.hearts;
  document.getElementById('xpHome').textContent = state.xp;
}

function speakText(text){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'hi-IN';
    window.speechSynthesis.speak(msg);
  }
}

function startPractice(){
  alert('Practice feature jaldi aa raha hai bhai');
}

function openDay(day){
  currentDay = day;
  currentQ = 0;

  if(day === 1){
    quizData = [
      {q: "I ___ a student", h: "मैं एक छात्र हूँ", opt: ["am", "is", "are"], ans: 0, exp: "I के साथ 'am' लगता है"},
      {q: "I ___ happy", h: "मैं खुश हूँ", opt: ["is", "am", "are"], ans: 1, exp: "I के साथ 'am' लगता है"},
      {q: "I ___ from India", h: "मैं भारत से हूँ", opt: ["are", "am", "is"], ans: 1, exp: "I के साथ 'am' लगता है"}
    ];
  }else{
    quizData = [
      {q: "Day " + day + " Quiz", h: "जल्द आ रहा है", opt: ["OK"], ans: 0, exp: "Day " + day + " का quiz bana rahe hain"}
    ];
  }

  showScreen('quizScreen');
  showQuestion();
}

function showQuestion(){
  if(currentQ >= quizData.length){
    alert('Day ' + currentDay + ' Complete! +10 XP');
    state.xp += 10;
    if(!state.done.includes(currentDay)) state.done.push(currentDay);
    updateStats();
    saveState();
    loadDays();
    showScreen('homeScreen');
    return;
  }

  let q = quizData[currentQ];
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('hindiText').textContent = q.h;
  document.getElementById('progressBar').style.width = ((currentQ+1)/quizData.length*100) + '%';
  document.getElementById('progressText').textContent = `Question ${currentQ+1}/${quizData.length}`;

  let optBox = document.getElementById('optionsBox');
  optBox.innerHTML = '';
  q.opt.forEach((option, i) => {
    let btn = document.createElement('button');
    btn.className = 'btn btn-opt';
    btn.textContent = option;
    btn.onclick = () => checkAnswer(i);
    optBox.appendChild(btn);
  });

  document.getElementById('feedback').textContent = '';
  document.getElementById('grammarBox').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
}

function checkAnswer(selected){
  let q = quizData[currentQ];
  let btns = document.querySelectorAll('#optionsBox.btn-opt');

  btns.forEach((b, i) => {
    b.disabled = true;
    if(i === q.ans) b.classList.add('correct');
    else if(i === selected) b.classList.add('wrong');
  });

  if(selected === q.ans){
    document.getElementById('feedback').textContent = '✅ Sahi!';
    state.xp += 2;
  }else{
    document.getElementById('feedback').textContent = '❌ Galat!';
    state.hearts -= 1;
    state.wrong.push({q: q.q, correct: q.opt[q.ans]});
  }

  document.getElementById('grammarBox').innerHTML = `<b>Explanation:</b> ${q.exp}`;
  document.getElementById('grammarBox').classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  updateStats();
  saveState();
}

function nextQuestion(){
  currentQ++;
  showQuestion();
}

function showDoubtScreen(){
  showScreen('doubtScreen');
  if(chatHistory.length === 0){
    addAIMessage("नमस्ते! मैं Maya Didi हूँ 😊<br>कोई भी English का Doubt पूछो - Grammar, Translation, Meaning कुछ भी। मैं Example के साथ समझाऊंगी।");
  }
}

function addUserMessage(text){
  chatHistory.push({role:'user',text:text});
  let chatBox = document.getElementById('chatBox');
  chatBox.innerHTML += `<div class="chat-msg user-msg">${text}</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addAIMessage(text){
  chatHistory.push({role:'ai',text:text});
  let chatBox = document.getElementById('chatBox');
  chatBox.innerHTML += `<div class="chat-msg ai-msg"><b>Maya Didi:</b><br>${text}</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping(){
  let chatBox = document.getElementById('chatBox');
  chatBox.innerHTML += `<div class="chat-msg ai-msg" id="typingMsg"><b>Maya Didi:</b><br><div class="typing"><span></span><span></span></div></div>`;
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping(){
  let typing = document.getElementById('typingMsg');
  if(typing) typing.remove();
}

function askDoubt(){
  let input = document.getElementById('doubtInput');
  let question = input.value.trim();
  if(!question) return;
  addUserMessage(question);
  input.value = '';
  showTyping();
  setTimeout(()=>{
    removeTyping();
    let answer = getMayaAnswer(question);
    addAIMessage(answer);
    speakText(answer.replace(/<br>/g,' ').replace(/<b>|<\/b>/g,''));
  },1500);
}

function askDoubtVoice(){
  if(!('webkitSpeechRecognition' in window)){
    alert('Chrome में खोलो भाई');
    return;
  }
  let recognition = new webkitSpeechRecognition();
  recognition.lang = 'hi-IN';
  recognition.onresult = function(event){
    let spoken = event.results[0][0].transcript;
    document.getElementById('doubtInput').value = spoken;
    askDoubt();
  };
  recognition.start();
}

function getMayaAnswer(q){
  q = q.toLowerCase();
  if(q.includes('i am go') || q.includes('am go')){
    return `❌ <b>"I am go"</b> गलत है बेटा।<br><br><b>सही:</b> "I go" या "I am going"<br><br><b>Rule:</b> 'am' के बाद Verb की -ing form लगती है।<br><b>Example:</b><br>✅ I am going - मैं जा रहा हूँ<br>✅ I go - मैं जाता हूँ`;
  }
  return `समझ गई बेटा! 😊<br><br>तुमने पूछा: "<b>${q}</b>"<br><br><b>मैं ये सब सिखा सकती हूँ:</b><br>1. Grammar Rules<br>2. Translation<br>3. Daily Sentences`;
}

window.onload = function(){
  loadState();
  loadDays();
  showScreen('homeScreen');
}
</script>
</body>
</html>
