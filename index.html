<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Maya English Course</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{font-family:sans-serif;background:#f0f2f5}
.app{width:100%;height:100%;background:#fff;display:flex;flex-direction:column}
.header{background:#1d4ed8;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;width:100%;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;background:#fff;color:#1d4ed8;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:20px}
.title{font-size:18px;font-weight:600}
.subtitle{font-size:12px;opacity:.8}
.stats{display:flex;gap:12px;font-size:13px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:16px;width:100%}
.nav{display:flex;border-top:1px solid #ddd;background:#fff;width:100%}
.tab{flex:1;padding:12px;border:none;background:none;font-size:14px}
.tab.active{color:#1d4ed8;font-weight:600;border-top:2px solid #1d4ed8}
.unit-title{background:#e8f0fe;color:#1d4ed8;padding:8px 16px;border-radius:8px;font-weight:600;margin-bottom:16px;text-align:center;position:sticky;top:0}
.lesson-path{display:flex;flex-direction:column;align-items:center;gap:20px;padding-bottom:40px}
.lesson-node{width:70px;height:70px;background:#e5e5e5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;box-shadow:0 4px 0 #ccc;border:4px solid #fff}
.lesson-node.active{background:#1d4ed8;box-shadow:0 4px 0 #1740ae;color:#fff;cursor:pointer}
.lesson-node.locked{background:#e5e5e5;color:#999;cursor:not-allowed}
.lesson-node.locked::after{content:"🔒";position:absolute;font-size:18px}
.lesson-node span{position:absolute;bottom:-25px;font-size:12px;color:#333;font-weight:600;white-space:nowrap}
.lesson-card{background:white;border-radius:12px;padding:16px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.lesson-card h3{margin-top:0;color:#1d4ed8;border-bottom:2px solid #eee;padding-bottom:8px;font-size:16px;display:flex;justify-content:space-between;align-items:center}
.btn-tip{background:#ff9600!important;width:auto!important;padding:6px 10px!important;font-size:12px!important}
.lesson-card button{background:#1d4ed8;color:white;border:none;padding:10px 16px;border-radius:8px;margin:4px;cursor:pointer;font-size:14px;font-weight:600;width:100%}
.lesson-card button:disabled{background:#ccc}
.btn-mic{background:#ff4b4b!important}
.btn-mic.listening{background:#58cc02!important;animation:pulse 1s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.progress-bar{width:100%;height:12px;background:#e5e5e5;border-radius:6px;margin:12px 0}
.progress-fill{height:100%;background:#58cc02;border-radius:6px;width:0%;transition:width 0.3s}
.grammar-box{background:#fff9e6;border:2px solid #ffd43b;border-radius:12px;padding:12px;margin:12px 0}
.grammar-box h4{margin:0 0 8px 0;color:#e67700;font-size:14px}
.grammar-box p{margin:0;font-size:14px;line-height:1.5}
.maya-box{background:#ffe6f0;border:2px solid #ff6b9d;border-radius:12px;padding:12px;margin:12px 0;display:flex;gap:10px;align-items:flex-start;transition:opacity 0.5s}
.maya-avatar{font-size:32px;min-width:32px}
.maya-text{font-size:14px;line-height:1.5;color:#c2255c}
.maya-text b{color:#a61e4d}
.question-box{background:#f8f9fa;padding:16px;border-radius:12px;margin:12px 0;text-align:center}
.question-box.q-title{font-size:16px;font-weight:600;margin-bottom:12px;text-align:left;color:#1d4ed8}
.question-box.en{font-size:20px;font-weight:600;margin-bottom:8px}
.question-box.hi{font-size:16px;color:#555;margin-bottom:12px}
.option{border:2px solid #ddd;padding:12px;border-radius:12px;margin:8px 0;text-align:center;font-weight:600;cursor:pointer}
.option.selected{border-color:#1d4ed8;background:#e8f0fe;color:#1d4ed8}
.btn-check{background:#58cc02!important;margin-top:16px}
.result{font-size:18px;font-weight:600;margin-top:12px;height:24px}
.result.correct{color:#58cc02}
.result.wrong{color:#ff4b4b}
.ad-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:999}
.ad-box{background:#fff;border-radius:16px;padding:24px;margin:20px;text-align:center;max-width:320px}
.ad-box h3{color:#1d4ed8;margin-bottom:12px}
.ad-box p{margin-bottom:16px;line-height:1.5}
.ad-btn{background:#58cc02;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-weight:600;font-size:16px;width:100%;margin:8px 0}
.ad-skip{background:#999!important}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-left">
    <div class="logo">👩‍🏫</div>
    <div><div class="title">Maya Didi</div><div class="subtitle" id="unitName">Unit 1: Basics</div></div>
  </div>
  <div class="stats">
    <div>🔥 <span id="streak">0</span></div>
    <div>❤️ <span id="hearts">3</span></div>
    <div>⚡ <span id="xp">0</span></div>
  </div>
</div>
<div class="content" id="content"></div>
<div class="nav">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="profile">Profile</button>
</div>
</div>

<div class="ad-popup" id="adPopup">
  <div class="ad-box">
    <h3 id="adTitle">❤️ Heart खत्म हो गए!</h3>
    <p id="adText">अरे बेटा! Heart खत्म हो गए 😢<br><br>1 छोटा Ad देख लो, <b>3 Heart एकदम फ्री</b> मिलेंगे 💛<br><br>Ad सिर्फ 5 सेकंड का है</p>
    <button class="ad-btn" onclick="watchAd()">📺 Ad देखो</button>
    <button class="ad-btn ad-skip" id="adSkipBtn" onclick="skipAd()">बाद में</button>
  </div>
</div>

<script>
let userData = {
  streak: parseInt(localStorage.getItem('streak')) || 0,
  hearts: parseInt(localStorage.getItem('hearts')) || 3,
  xp: parseInt(localStorage.getItem('xp')) || 0,
  unlockedDay: parseInt(localStorage.getItem('unlockedDay')) || 1,
  lastOpen: localStorage.getItem('lastOpen') || new Date().toDateString(),
  lessonsCompleted: parseInt(localStorage.getItem('lessonsCompleted')) || 0
};

let currentLesson = {day: 0, qIndex: 0, correct: 0, selectedOption: null, showGrammar: true, mayaSpoken: false};
let adType = 'hearts';

const mayaDialogues = {
  welcomeBack: ["अरे वाह! वापस आ गई मेरी बच्ची 😊", "मैं कब से इंतज़ार कर रही थी बेटा 💛", "चलो आज नया सीखते हैं"],
  correctAnswer: ["शाबाश! बिल्कुल सही 🎉", "एकदम Perfect! 💪", "बहुत बढ़िया! अगले सवाल पे चलो"],
  perfectScore: ["अरे वाह! 10 में से 10! मेरी स्टूडेंट Topper है ⭐ मुझे तुमपे गर्व है 🎊 अब Day {next} पे क्लिक करके शुरू करो"],
  lessonPass: ["शाबाश! Day {day} पास कर लिया 🎊 अब Day {next} पे क्लिक करके शुरू करो जल्दी"],
  lessonFail: ["कोई बात नहीं बेटा, 7 सही चाहिए थे। फिर से कोशिश करते हैं 💛", "मैं हूँ ना साथ में। एक बार Grammar पढ़ लो फिर करते हैं"],
  streakMiss: ["अरे! कल आई ही नहीं तू 😭 मेरा 🔥 Streak टूट गया। आज पक्का करना Lesson"]
};

function mayaTeachGrammar(question, correctAnswer, userAnswer){
  const rules = {
    "drinks": "बेटा देखो, He/She/It के साथ verb में 's' लगता है। She + drinks = She drinks। मतलब वह पानी पीती है। I/You/We/They के साथ s नहीं लगता - I drink, We drink।",
    "goes": "अरे! He/She के साथ go नहीं, goes होता है। He goes to school = वह स्कूल जाता है। याद रखना बेटा।",
    "your": "यहां 'your' आएगा बेटा। What is your name? = तुम्हारा नाम क्या है? My = मेरा, Your = तुम्हारा।",
    "brushes": "She के साथ brush नहीं brushes। She brushes her teeth = वह दांत साफ करती है। He/She + s का रूल।",
    "is": "Present Continuous में He/She के साथ 'is' लगता है। She is reading = वह पढ़ रही है। I am, You are, We are।",
    "likes": "He/She के साथ like नहीं likes। She likes mango = उसे आम पसंद है।",
    "eats": "She eats food = वह खाना खाती है। He/She + s लगाना मत भूलना।",
    "plays": "We play, They play, पर He plays, She plays। समझ गए?",
    "reads": "He reads book = वह किताब पढ़ता है। s लगा दिया ना?",
    "writes": "She writes letter = वह चिट्ठी लिखती है।"
  };
  return rules[correctAnswer] || `सही जवाब "${correctAnswer}" है बेटा। इसका मतलब समझो: "${question}" में ${correctAnswer} use होता है। अगली बार ध्यान रखना 💛`;
}

function showMayaMessage(text, speak=true, keepOnScreen=false){
  const mayaHTML = `<div class="maya-box" id="mayaBox"><div class="maya-avatar">👩‍🏫</div><div class="maya-text">${text}</div></div>`;
  if(speak &&!currentLesson.mayaSpoken) {
    currentLesson.mayaSpoken = true;
    speechSynthesis.cancel();
    const msg=new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, ''));
    msg.lang='hi-IN';
    msg.rate=0.85;

    msg.onend = function() {
      currentLesson.mayaSpoken = false;
      if(!keepOnScreen){
        setTimeout(()=>{
          const box = document.getElementById('mayaBox');
          if(box) box.style.opacity = '0.5';
        }, 1000);
      }
    };

    speechSynthesis.speak(msg);
  }
  return mayaHTML;
}

function updateStats(){
  document.getElementById('streak').innerText = userData.streak;
  document.getElementById('hearts').innerText = userData.hearts;
  document.getElementById('xp').innerText = userData.xp;
  localStorage.setItem('streak', userData.streak);
  localStorage.setItem('hearts', userData.hearts);
  localStorage.setItem('xp', userData.xp);
  localStorage.setItem('unlockedDay', userData.unlockedDay);
  localStorage.setItem('lessonsCompleted', userData.lessonsCompleted);
  localStorage.setItem('lastOpen', new Date().toDateString());
}

function showAdPopup(type='hearts'){
  adType = type;
  const title = document.getElementById('adTitle');
  const text = document.getElementById('adText');
  const skipBtn = document.getElementById('adSkipBtn');

  if(type === 'hearts'){
    title.innerText = '❤️ Heart खत्म हो गए!';
    text.innerHTML = 'अरे बेटा! Heart खत्म हो गए 😢<br><br>1 छोटा Ad देख लो, <b>3 Heart एकदम फ्री</b> मिलेंगे 💛<br><br>Ad सिर्फ 5 सेकंड का है';
    skipBtn.style.display = 'block';
  } else if(type === 'lesson'){
    title.innerText = '🎉 Lesson Complete!';
    text.innerHTML = 'शाबाश बेटा! Lesson पूरा कर लिया 💛<br><br>अगला Lesson शुरू करने से पहले 1 छोटा Ad देख लो<br><br>सिर्फ 5 सेकंड';
    skipBtn.style.display = 'none';
  }

  document.getElementById('adPopup').style.display = 'flex';
}

function watchAd(){
  document.getElementById('adPopup').style.display = 'none';
  alert("📺 Ad चल रहा है... 5...4...3...2...1... 🎉");

  if(adType === 'hearts'){
    userData.hearts = 3;
    loadTab('home');
    setTimeout(()=>{
      content.innerHTML = getHomeHTML() + showMayaMessage("शाबाश! ये लो 3 Heart वापस। अब ध्यान से करना बेटा", true, true);
    }, 300);
  } else if(adType === 'lesson'){
    loadTab('home');
    setTimeout(()=>{
      content.innerHTML = getHomeHTML() + showMayaMessage("धन्यवाद बेटा! अब Day " + (userData.unlockedDay) + " पे क्लिक करके शुरू करो 💛", true, true);
    }, 300);
  }

  updateStats();
}

function skipAd(){
  document.getElementById('adPopup').style.display = 'none';
  if(adType === 'hearts'){
    userData.hearts = 3;
    updateStats();
  }
  loadTab('home');
}

const content=document.getElementById('content');
const tabs=document.querySelectorAll('.tab');

function checkStreak(){
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if(userData.lastOpen!== today && userData.lastOpen!== yesterday && userData.streak > 0){
    userData.streak = 0;
    return mayaDialogues.streakMiss;
  }
  return null;
}

const lessons = {
  1: {
    title:"Greetings",
    grammar:"<b>Rule:</b> 'How are you?' = 'आप कैसे हैं?'। जवाब 'I am fine' = 'मैं ठीक हूँ'।",
    ruleShort:"'How are you?' का जवाब 'I am fine' होता है",
    questions:[
      {type:"speak", q:"How are you?", a:"आप कैसे हैं?"},
      {type:"speak", q:"I am fine", a:"मैं ठीक हूँ"},
      {type:"fill", q:"___ morning", a:"Good", options:["Good","Bad","Fresh"], hi:"सुप्रभात"},
      {type:"speak", q:"Good night", a:"शुभ रात्रि"},
      {type:"fill", q:"___ to meet you", a:"Nice", options:["Nice","Bad","Sad"], hi:"आपसे मिलकर अच्छा लगा"},
      {type:"speak", q:"See you later", a:"फिर मिलते हैं"},
      {type:"fill", q:"Have a ___ day", a:"nice", options:["nice","bad","long"], hi:"आपका दिन अच्छा हो"},
      {type:"speak", q:"Thank you", a:"धन्यवाद"},
      {type:"fill", q:"You are ___", a:"welcome", options:["welcome","hello","bye"], hi:"आपका स्वागत है"},
      {type:"speak", q:"Sorry", a:"माफ़ करना"}
  ]},
  2: {
    title:"Introduction",
    grammar:"<b>Rule:</b> 'My name is ___' से नाम बताओ। 'What is your name?' से पूछो।",
    ruleShort:"नाम बताने को 'My name is' बोलो",
    questions:[
      {type:"speak", q:"My name is Maya", a:"मेरा नाम माया है"},
      {type:"fill", q:"What is ___ name?", a:"your", options:["your","my","her"], hi:"तुम्हारा नाम क्या है?"},
      {type:"speak", q:"I am 20 years old", a:"मैं 20 साल का हूँ"},
      {type:"fill", q:"I am from ___", a:"India", options:["India","School","Home"], hi:"मैं भारत से हूँ"},
      {type:"speak", q:"Where are you from?", a:"आप कहाँ से हैं?"},
      {type:"fill", q:"He is my ___", a:"friend", options:["friend","book","pen"], hi:"वह मेरा दोस्त है"},
      {type:"speak", q:"This is my sister", a:"यह मेरी बहन है"},
      {type:"fill", q:"Nice to ___ you", a:"meet", options:["meet","see","eat"], hi:"आपसे मिलकर अच्छा लगा"},
      {type:"speak", q:"I live in Delhi", a:"मैं दिल्ली में रहता हूँ"},
      {type:"fill", q:"She is a ___", a:"student", options:["student","teacher","doctor"], hi:"वह एक छात्रा है"}
  ]},
  3: {
    title:"Simple Verbs",
    grammar:"<b>Rule:</b> I/You/We/They + base verb. He/She/It + verb+s। Example: I eat, She eats",
    ruleShort:"He/She के साथ verb में 's' लगाओ: She eats",
    questions:[
      {type:"speak", q:"I eat food", a:"मैं खाना खाता हूँ"},
      {type:"fill", q:"She ___ water", a:"drinks", options:["drinks","drink","eats"], hi:"वह पानी पीती है"},
      {type:"speak", q:"We play games", a:"हम खेल खेलते हैं"},
      {type:"fill", q:"They ___ to school", a:"go", options:["go","goes","going"], hi:"वे स्कूल जाते हैं"},
      {type:"speak", q:"He reads a book", a:"वह किताब पढ़ता है"},
      {type:"fill", q:"I ___ English", a:"speak", options:["speak","speaks","speaking"], hi:"मैं अंग्रेजी बोलता हूँ"},
      {type:"speak", q:"She writes a letter", a:"वह चिट्ठी लिखती है"},
      {type:"fill", q:"We ___ cricket", a:"play", options:["play","plays","playing"], hi:"हम क्रिकेट खेलते हैं"},

      {type:"speak", q:"What is this?", a:"यह क्या है?"},

for(let i=6; i<=30; i++){
  lessons[i] = {
    title:`Day ${i} Topic`,
    grammar:`<b>Rule:</b> Day ${i} का Grammar रूल यहाँ आएगा।`,
    ruleShort:`Day ${i} का छोटा रूल`,
    questions:[
      {type:"speak", q:"Sample question 1", a:"नमूना जवाब 1"},
      {type:"fill", q:"Sample ___ 2", a:"answer", options:["answer","wrong1","wrong2"], hi:"नमूना हिंदी 2"},

function getHomeHTML(){
  const streakMsg = checkStreak();
  let mayaWelcome = '';
  if(streakMsg){
    mayaWelcome = showMayaMessage(streakMsg);
  } else if(userData.lastOpen!== new Date().toDateString()){
    const msg = mayaDialogues.welcomeBack[Math.floor(Math.random()*mayaDialogues.welcomeBack.length)];
    mayaWelcome = showMayaMessage(msg);
  }

  return `${mayaWelcome}<div class="unit-title">UNIT 1: BASICS - 30 DAYS</div>
  <div class="lesson-path">
  ${Object.keys(lessons).map(day => {
    const status = parseInt(day) <= userData.unlockedDay? 'active' : 'locked';
    const icon = parseInt(day) <= userData.unlockedDay? '⭐' : '';
    return `<div class="lesson-node ${status}" onclick="startLesson(${day})">${icon}<span>Day ${day}</span></div>`
  }).join('')}
  </div>`;
}

function startLesson(day){
  day = parseInt(day);
  if(day > userData.unlockedDay) return alert('Maya Didi: पहले Day ' + (day-1) + ' पास करो बेटा 🔒');
  if(userData.hearts <= 0) {
    showAdPopup('hearts');
    return;
  }
  currentLesson = {day: day, qIndex: 0, correct: 0, selectedOption: null, showGrammar: true, mayaSpoken: false};
  showQuestion();
}

function showQuestion(){
  const l = lessons[currentLesson.day];
  const q = l.questions[currentLesson.qIndex];
  const progress = (currentLesson.qIndex / l.questions.length) * 100;

  let grammarHTML = '';
  if(currentLesson.showGrammar && currentLesson.qIndex === 0){
    grammarHTML = `
      <div class="grammar-box">
        <h4>📖 Maya Didi का Grammar Tip</h4>
        <p>${l.grammar}</p>
        <button onclick="currentLesson.showGrammar=false; showQuestion()" style="background:#ff9600;margin-top:8px">समझ गए, शुरू करें</button>
      </div>`;
    content.innerHTML = `
    <div class="lesson-card">
      <h3>Day ${currentLesson.day}: ${l.title} - ${currentLesson.correct}/10 सही</h3>
      <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
      ${showMayaMessage("चलो बेटा, पहले रूल समझ ले। फिर सवाल आसान लगेंगे 💛", false)}
      ${grammarHTML}
    </div>`;
    return;
  }

  let questionHTML = '';
  if(q.type === 'speak'){
    questionHTML = `
      <div class="question-box">
        <div class="q-title">सवाल ${currentLesson.qIndex+1}/10: इसे बोलो 🎤</div>
        <div class="hi">${q.a}</div>
        <div class="en">English: ${q.q}</div>
        <button onclick="speak('${q.q}')">🔊 सुनो</button>
        <button class="btn-mic" id="micBtn" onclick="startMic('${q.q}')">🎤 बोलो</button>
        <div class="result" id="result"></div>
      </div>`;
  } else if(q.type === 'fill'){
    questionHTML = `
      <div class="question-box">
        <div class="q-title">सवाल ${currentLesson.qIndex+1}/10: खाली जगह भरें ✍️</div>
        <div class="en">${q.q.replace('___', '_____')}</div>
        <div class="hi">${q.hi}</div>
        ${q.options.map(opt => `<div class="option" onclick="selectOption(this,'${opt}')">${opt}</div>`).join('')}
        <button class="btn-check" onclick="checkFill('${q.a}')">चेक करें</button>
        <div class="result" id="result"></div>
      </div>`;
  }

  content.innerHTML = `
  <div class="lesson-card">
    <h3>Day ${currentLesson.day}: ${l.title} - ${currentLesson.correct}/10 सही
      <button class="btn-tip" onclick="currentLesson.showGrammar=true; showQuestion()">💡 Tip</button>
    </h3>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    ${questionHTML}
  </div>`;
}

function selectOption(el, opt){
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  currentLesson.selectedOption = opt;
}

function checkFill(correctAnswer){
  if(!currentLesson.selectedOption) return alert('Maya Didi: पहले कोई Option चुनो बेटा');
  const resultDiv = document.getElementById('result');
  const l = lessons[currentLesson.day];
  const q = l.questions[currentLesson.qIndex];

  if(currentLesson.selectedOption === correctAnswer){
    resultDiv.innerText = 'सही! ✅ +10 XP';
    resultDiv.className = 'result correct';
    userData.xp += 10;
    currentLesson.correct++;
    const msg = mayaDialogues.correctAnswer[Math.floor(Math.random()*mayaDialogues.correctAnswer.length)];
    content.insertAdjacentHTML('afterbegin', showMayaMessage(msg, true));
    setTimeout(nextQuestion, 2500);
  } else {
    resultDiv.innerText = 'गलत ❌ सही: ' + correctAnswer;
    resultDiv.className = 'result wrong';
    userData.hearts--;
    const msg = mayaTeachGrammar(q.q, correctAnswer, currentLesson.selectedOption);
    content.insertAdjacentHTML('afterbegin', showMayaMessage(msg, true, true));

    setTimeout(()=>{
      if(!currentLesson.mayaSpoken) nextQuestion();
      else {
        const checkSpeech = setInterval(()=>{
          if(!currentLesson.mayaSpoken){
            clearInterval(checkSpeech);
            setTimeout(nextQuestion, 2000);
          }
        }, 500);
      }
    }, 1000);

    if(userData.hearts <= 0){
      setTimeout(()=>{showAdPopup('hearts')}, 6000);
    }
  }
  updateStats();
}

function startMic(correctAnswer){
  if(userData.hearts <= 0) {
    showAdPopup('hearts');
    return;
  }
  const micBtn = document.getElementById('micBtn');
  const resultDiv = document.getElementById('result');
  const l = lessons[currentLesson.day];
  const q = l.questions[currentLesson.qIndex];

  if(!('webkitSpeechRecognition' in window)){
    alert('Maya Didi: बेटा Chrome में खोल, Mic सपोर्ट नहीं है यहाँ 😢');
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = false;

  micBtn.classList.add('listening');
  micBtn.innerText = '🎤 सुन रही हूँ...';
  resultDiv.innerText = '';

  recognition.onresult = function(event){
    const spoken = event.results[0][0].transcript.toLowerCase().trim();
    const correct = correctAnswer.toLowerCase().replace(/[.?']/g,'').trim();
    micBtn.classList.remove('listening');
    micBtn.innerText = '🎤 बोलो';

    if(spoken === correct){
      resultDiv.innerText = 'सही! ✅ +10 XP';
      resultDiv.className = 'result correct';
      userData.xp += 10;
      currentLesson.correct++;
      const msg = mayaDialogues.correctAnswer[Math.floor(Math.random()*mayaDialogues.correctAnswer.length)];
      content.insertAdjacentHTML('afterbegin', showMayaMessage(msg, true));
      setTimeout(nextQuestion, 2500);
    } else {
      resultDiv.innerText = `गलत ❌ तुमने बोला: "${spoken}"`;
      resultDiv.className = 'result wrong';
      userData.hearts--;
      const msg = mayaTeachGrammar(q.q, correctAnswer, spoken);
      content.insertAdjacentHTML('afterbegin', showMayaMessage(msg, true, true));

      setTimeout(()=>{
        if(!currentLesson.mayaSpoken) nextQuestion();
        else {
          const checkSpeech = setInterval(()=>{
            if(!currentLesson.mayaSpoken){
              clearInterval(checkSpeech);
              setTimeout(nextQuestion, 2000);
            }
          }, 500);
        }
      }, 1000);

      if(userData.hearts <= 0){
        setTimeout(()=>{showAdPopup('hearts')}, 6000);
      }
    }
    updateStats();
  };

  recognition.onerror = function(){
    micBtn.classList.remove('listening');
    micBtn.innerText = '🎤 बोलो';
    resultDiv.innerText = 'आवाज साफ नहीं आई बेटा, फिर से बोल';
    resultDiv.className = 'result wrong';
    showMayaMessage('आवाज साफ नहीं आई बेटा, फिर से बोलो', true);
  };

  recognition.start();
}
