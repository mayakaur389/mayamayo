<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Didi Grammar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding-bottom: 20px;
        }

  .header {
            background: #1a73e8; padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
  .header-title { font-size: 20px; font-weight: 600; }
  .stats { display: flex; gap: 12px; font-size: 16px; }
  .stats span { cursor: pointer; }

  .top-buttons { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .btn-purple {
            background: #8B5CF6; color: white; border: none; padding: 16px;
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
  .btn-yellow {
            background: #FBBF24; color: #000; border: none; padding: 16px;
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

  .card {
            background: #fff; color: #000; margin: 0 16px;
            padding: 20px; border-radius: 16px;
        }
  .card h2 { color: #1a73e8; font-size: 20px; margin-bottom: 4px; }
  .card p { color: #666; font-size: 14px; margin-bottom: 16px; }

        /* Day Grid Container */
  .day-section {
            background: #1e293b; margin: 0 16px 16px 16px;
            padding: 20px; border-radius: 16px;
        }
  .day-section h3 { color: #fff; font-size: 18px; margin-bottom: 4px; }
  .day-section p { color: #94a3b8; font-size: 14px; margin-bottom: 16px; }

  .day-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 12px; margin-top: 16px;
        }

  .day-btn {
            aspect-ratio: 1; border-radius: 50%; border: none;
            font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; transition: transform 0.2s;
        }
  .day-btn:active { transform: scale(0.9); }

  .day-completed { background: #10B981; color: white; }
  .day-current { background: #3B82F6; color: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
  .day-locked { background: #334155; color: #64748b; cursor: not-allowed; }
  .day-icon { font-size: 16px; line-height: 1; }
  .day-text { font-size: 10px; margin-top: 2px; }

  .btn-blue {
            background: #1a73e8; color: white; border: none; width: 100%;
            padding: 14px; border-radius: 10px; font-size: 15px;
            font-weight: 600; margin: 8px 0; cursor: pointer;
        }

  .input-box {
            width: 100%; padding: 14px; border: 2px solid #1a73e8;
            border-radius: 10px; font-size: 15px; margin: 8px 0; outline: none;
        }

  .btn-green {
            background: #10B981; color: white; border: none; padding: 12px 28px;
            border-radius: 10px; font-size: 15px; font-weight: 600;
            cursor: pointer; float: right; margin-top: 8px;
        }

        #progress-text { text-align: center; color: #666; margin: 12px 0; font-weight: 600; }
  .completed-msg {
            background: #10B981; color: white; padding: 12px;
            border-radius: 10px; text-align: center; margin: 12px 0; font-weight: 600;
        }

        #chat-container {
            display: none; background: #f5f5f5; border-radius: 10px;
            padding: 12px; margin: 12px 0; max-height: 300px; overflow-y: auto;
        }
  .bot-msg {
            background: #1a73e8; color: white; padding: 10px;
            border-radius: 8px; margin: 6px 0; max-width: 85%;
        }
  .user-msg {
            background: #e0e0e0; color: #000; padding: 10px;
            border-radius: 8px; margin: 6px 0; max-width: 85%;
            margin-left: auto; text-align: right;
        }

        body.light-mode { background: #f5f5f5; }
        body.light-mode.card { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        body.light-mode.day-section { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        body.light-mode.day-section h3 { color: #000; }
        body.light-mode.day-section p { color: #666; }
        body.light-mode #chat-container { background: #fff; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">Maya Didi</div>
        <div class="stats">
            <span id="theme-toggle" onclick="toggleTheme()">☀️</span>
            <span>🔥<span id="streak">11</span></span>
            <span onclick="addHeart()">❤️<span id="hearts">1</span></span>
            <span>⚡<span id="xp">260</span></span>
            <span onclick="toggleTheme()">🌙</span>
        </div>
    </div>

    <div class="top-buttons">
        <button class="btn-purple" onclick="openChat()">
            💬 Maya se Gupshup Karo
        </button>
        <button class="btn-yellow" onclick="startPracticeMode()">
            📝 Practice Shuru Karo
        </button>
    </div>

    <!-- Day Grid Section - Image Jaisa -->
    <div class="day-section">
        <h3>UNIT 1: BASICS - 30 DAYS</h3>
        <p>Day chuno aur seekhna shuru karo</p>
        <div class="day-grid" id="day-grid"></div>
    </div>

    <div class="card">
        <h2>Maya ke Saath Grammar + Quiz 📚</h2>
<p>Day-wise seekho, Maya se gupshup karo, Practice karo</p>

        <div id="progress-text"></div>
        <div id="lesson-container"></div>

        <div id="question-section" style="display:none;">
            <input type="text" id="question-text" class="input-box" readonly>
            <input type="text" id="answer-input" class="input-box" placeholder="Answer likho yaar">
            <button class="btn-green" onclick="checkAnswer()">Bhejo</button>
            <div style="clear:both"></div>
        </div>

        <div id="completed-section"></div>

        <!-- Friendly Maya Didi Chat -->
        <div id="chat-container">
            <div id="chat-box"></div>
            <input type="text" id="chat-input" class="input-box" placeholder="Maya se kuch bhi pucho yaar..." style="margin-top:10px;">
            <button class="btn-green" onclick="sendChat()" style="float:none;margin-top:8px;">Bhejo</button>
        </div>
    </div>

    <script src="lessons.js"></script>
    <script>
        let currentLessonIndex = 0;
        let currentQuestionIndex = 0;
        let wrongAnswers = [];
        let practiceMode = false;
        let chatOpen = false;
        let completedDays = []; // Complete hue days ka array

        window.onload = function() {
            if(typeof lessons === 'undefined') {
                alert('Error: lessons.js load nahi hua');
                return;
            }
            renderDayGrid();
            showCurrentLesson();

            document.getElementById('chat-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendChat();
            });
            document.getElementById('answer-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') checkAnswer();
            });
        }

        // Day Grid Render Karo - Image Jaisa
        function renderDayGrid() {
            const grid = document.getElementById('day-grid');
            grid.innerHTML = '';

            for(let i = 0; i < 30; i++) {
                const dayNum = i + 1;
                const btn = document.createElement('button');
                btn.className = 'day-btn';

                if(completedDays.includes(dayNum)) {
                    // Complete Day - Green + Tick
                    btn.className += ' day-completed';
                    btn.innerHTML = `<div class="day-icon">${dayNum}</div><div class="day-text">✓</div>`;
                    btn.onclick = () => alert('Ye day complete ho chuka hai! 🎉');
                } else if(dayNum === currentLessonIndex + 1) {
                    // Current Day - Blue + Start
                    btn.className += ' day-current';
                    btn.innerHTML = `<div class="day-icon">${dayNum}</div><div class="day-text">Start</div>`;
                    btn.onclick = () => startLessonFromDay(dayNum - 1);
                } else if(dayNum <= lessons.length) {
                    // Unlocked but not started - Grey + Lock
                    btn.className += ' day-locked';
                    btn.innerHTML = `<div class="day-icon">${dayNum}</div><div class="day-text">🔒</div>`;
                    btn.onclick = () => alert('Pehle Day ' + (currentLessonIndex + 1) + ' complete karo yaar! 😎');
                } else {
                    // Not available - Locked
                    btn.className += ' day-locked';
                    btn.innerHTML = `<div class="day-icon">${dayNum}</div><div class="day-text">🔒</div>`;
                    btn.onclick = () => alert('Ye day abhi available nahi hai!');
                }
                grid.appendChild(btn);
            }
        }

        function startLessonFromDay(index) {
            if(index!== currentLessonIndex) {
                alert('Pehle current day complete karo!');
                return;
            }
            startLesson();
        }

        function showCurrentLesson() {
            const container = document.getElementById('lesson-container');
            const progressText = document.getElementById('progress-text');

            if(currentLessonIndex >= lessons.length) {
                container.innerHTML = `<div class="completed-msg">🎉 Arre waah! Sab Lessons khatam! Tu toh topper nikla re 😎</div>`;
                document.getElementById('question-section').style.display = 'none';
                progressText.innerText = '';
                return;
            }

            const lesson = lessons[currentLessonIndex];
            progressText.innerText = `Lesson ${lesson.day} of ${lessons.length}`;
            container.innerHTML = '';
        }

        function startLesson() {
            practiceMode = false;
            currentQuestionIndex = 0;
            const lesson = lessons[currentLessonIndex];
            document.getElementById('question-section').style.display = 'block';
            document.getElementById('question-text').value = lesson.questions[0].q;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
            document.getElementById('question-section').scrollIntoView({behavior: 'smooth'});
        }

        function checkAnswer() {
            const ans = document.getElementById('answer-input').value.trim().toLowerCase();
            if(ans === '') return alert('Arre likh toh sahi pehle 😂');

            const lesson = practiceMode? wrongAnswers[0].lesson : lessons[currentLessonIndex];
            const question = practiceMode? wrongAnswers[0].question : lesson.questions[currentQuestionIndex];

            if(ans === question.answer.toLowerCase()) {
                alert('Shi baat! Ekdum correct 🔥 +10 XP milega tujhe');
                let xp = document.getElementById('xp');
                xp.innerText = parseInt(xp.innerText) + 10;

                if(practiceMode) {
                    wrongAnswers.shift();
                    if(wrongAnswers.length === 0) {
                        alert('Bas ho gaya practice! Tu toh master nikla 🎉');
                        document.getElementById('question-section').style.display = 'none';
                        return;
                    }
                    document.getElementById('question-text').value = wrongAnswers[0].question.q;
                } else {
                    currentQuestionIndex++;
                    if(currentQuestionIndex >= lesson.questions.length) {
                        // Day Complete
                        completedDays.push(lesson.day);
                        document.getElementById('completed-section').innerHTML =
                            `<div class="completed-msg">✅ Day ${lesson.day} Done! Aag laga di bhai 🔥</div>`;

                        setTimeout(() => {
                            currentLessonIndex++;
                            currentQuestionIndex = 0;
                            document.getElementById('question-section').style.display = 'none';
                            document.getElementById('completed-section').innerHTML = '';
                            renderDayGrid(); // Grid update karo
                            showCurrentLesson();
                        }, 1500);
                    } else {
                        document.getElementById('question-text').value = lesson.questions[currentQuestionIndex].q;
                    }
                }
                document.getElementById('answer-input').value = '';
            } else {
                alert('Galat ho gaya yaar 😅 Koi na, fir se try kar!');
                if(!practiceMode) {
                    wrongAnswers.push({ lesson: lesson, question: question });
                }
            }
        }

        function startPracticeMode() {
            if(wrongAnswers.length === 0) {
                alert('Abhi tak ek bhi galti nahi? Kya baat hai! Pehle lesson kar le phir aana 😎');
                return;
            }
            practiceMode = true;
            document.getElementById('question-section').style.display = 'block';
            document.getElementById('question-text').value = wrongAnswers[0].question.q;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
            document.getElementById('progress-text').innerText = `Practice Mode: ${wrongAnswers.length} Questions bache hain`;
            document.getElementById('question-section').scrollIntoView({behavior: 'smooth'});
        }

        function openChat() {
            chatOpen =!chatOpen;
            const container = document.getElementById('chat-container');
            const chatBox = document.getElementById('chat-box');
            container.style.display = chatOpen? 'block' : 'none';

            if(chatOpen && chatBox.innerHTML === '') {
                chatBox.innerHTML = `<div class="bot-msg"><b>Maya:</b> Heyy! Kya haal hai? 😄 Main Maya hun - teri Grammar wali dost! Padhai karni hai ya bas timepass? Kuch bhi puch le grammar ka 🤪</div>`;
            }
            if(chatOpen) container.scrollIntoView({behavior: 'smooth'});
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            const msg = input.value.trim();

            if(msg === '') return;

            chatBox.innerHTML += `<div class="user-msg"><b>Tu:</b> ${msg}</div>`;

            let reply = getFriendlyMayaReply(msg);

            setTimeout(() => {
                chatBox.innerHTML += `<div class="bot-msg"><b>Maya:</b> ${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 600);

            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function getFriendlyMayaReply(msg) {
            const lowerMsg = msg.toLowerCase();

            if(lowerMsg.match(/^(hi|hello|hey|hii|heyy)$/)) {
                return "Heyyy! Kya scene hai? 😎 Padhai ka mood hai ya bas bakchodi karni hai? Grammar me help chahiye toh bol de!";
            }
            if(lowerMsg.includes('kaise ho') || lowerMsg.includes('kya haal') || lowerMsg.includes('how are you')) {
                return "Main toh badiya hun yaar! Tu suna? Padhai wadhai ho rahi hai ya mobile me hi ghusa hai? 😂 Chal grammar ka koi doubt hai toh puch!";
            }
            if(lowerMsg.includes('bore') || lowerMsg.includes('boring')) {
                return "Bore ho raha hai? 😂 Chal ek grammar joke sun: Noun bola Verb se - 'Tu action me rehta hai, main toh bas naam ka hun!' Samjha? Nahi samjha toh Noun-Verb padh le phir 😜";
            }
            if(lowerMsg.includes('love') || lowerMsg.includes('pyar') || lowerMsg.includes('gf') || lowerMsg.includes('bf')) {
                return "Arre pyar-vyaar chhod 😂 Pehle grammar se pyar kar le! Exam me kaam aayega. Chal bata - 'Love' kaun sa part of speech hai? Noun bhi hai aur Verb bhi! Dekha, grammar bhi romantic hai 🤣";
            }
            if(lowerMsg.includes('noun')) {
                return "Noun yaani 'Naam' 😎 Person, Place, Animal, Thing ka naam. Jaise: Salman Khan - Proper Noun, Hero - Common Noun. Example: 'Mumbai me Salman Khan rehta hai' - yahan Mumbai aur Salman Khan dono Noun hain. Samjha kya? Ya momo kha raha hai dhyan nahi de raha 😂";
            }
            if(lowerMsg.includes('verb')) {
                return "Verb matlab 'Kaam' 💪 Jo action ho raha hai. Jaise: khana, peena, sona, padhna. 'Main PUBG khelta hun' - yahan 'khelta hun' verb hai. Tu kya khelta hai? Bata jaldi 😏";
            }
            if(lowerMsg.includes('tense')) {
                return "Tense yaani 'Time' ⏰ 3 types: 1) Present - Abhi: I eat momo 2) Past - Pehle: I ate momo 3) Future - Baad me: I will eat momo. Tu momo kab khayega? 😂 Bata kaunsa tense samjhaun detail me?";
            }
            if(lowerMsg.includes('thank')) {
                return "Arre thanks-wanks rehne de yaar! 😄 Tu seekh gaya na, wahi mere liye party hai 🎉 Aur doubt ho toh bindass puch lena. Main yahin hun!";
            }

            const funnyReplies = [
                `Haha tu '${msg}' bol raha hai? 😂 Chal chhod ye sab, grammar pe aate hain. Kya doubt hai bata?`,
                `Oye hoye! '${msg}' 😏 Itna dimag grammar me laga deta toh topper ban jaata! Chal puch kya puchna hai?`,
                `Samjhi nahi properly par koi na 😄 Tu grammar se related kuch puch le - Noun, Verb, Tense kuch bhi. Main example deke samjha dungi with mazaak!`,
                `Arre yaar tu toh bada curious hai! 😂 Par main Grammar wali Maya hun, toh grammar ka hi puch. Chal bata Tense aata hai ya main samjhaun?`
            ];
            return funnyReplies[Math.floor(Math.random() * funnyReplies.length)];
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-toggle');
            icon.innerText = document.body.classList.contains('light-mode')? '🌙' : '☀️';
        }

        function addHeart() {
            let hearts = document.getElementById('hearts');
            hearts.innerText = parseInt(hearts.innerText) + 1;
        }
    </script>
</body>
</html>
