<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Didi Grammar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-title">Maya Didi</div>
        <div class="stats">
            <span id="theme-toggle" onclick="toggleTheme()">🌙</span>
            <span>🔥<span id="streak">11</span></span>
            <span onclick="addHeart()">❤️<span id="hearts">1</span></span>
            <span>⚡<span id="xp">260</span></span>
        </div>
    </div>

    <!-- Day Wale Gol Button -->
    <div class="section" style="background:transparent;padding:0;">
        <h3 style="color:#e0e0e0;margin:16px 0 8px 0;">📅 Daily Practice</h3>
        <div class="day-circle-container" id="day-buttons"></div>
    </div>

    <!-- Grammar Card -->
    <div class="card">
        <h2>Maya Didi ke Saath Grammar Seekho</h2>
        <p id="question-text">Lesson select karo ya Day 1 dabao</p>
        <input type="text" id="answer-input" placeholder="Apna jawab likho...">
        <button onclick="checkAnswer()">Check</button>
    </div>

    <!-- Maya Didi Chat Box -->
    <div class="card">
        <h2>💬 Maya Didi Se Baate Karo</h2>
        <div id="chat-box" style="height:200px;overflow-y:auto;background:#000;padding:10px;border-radius:8px;margin-bottom:10px;">
            <div class="bot-msg">Namaste! Main Maya Didi hun. Kuch bhi Grammar pucho 😊</div>
        </div>
        <input type="text" id="chat-input" placeholder="Maya Didi se kuch pucho...">
        <button onclick="sendChat()">Bhejo</button>
    </div>

    <!-- Lesson List -->
    <div class="section">
        <h3>Grammar Lessons</h3>
        <div id="lesson-list"></div>
    </div>

    <script src="lessons.js"></script>
    <script>
        let currentLesson = '';

        window.onload = function() {
            const list = document.getElementById('lesson-list');
            const dayContainer = document.getElementById('day-buttons');

            if(typeof lessons === 'undefined') {
                alert('Error: lessons.js load nahi hua. File name check karo');
                return;
            }

            lessons.forEach((lesson, i) => {
                list.innerHTML += `<button class="btn-blue" onclick="selectLesson(${i})">Lesson ${i+1}: ${lesson.title}</button>`;
                dayContainer.innerHTML += `<div class="day-circle" onclick="startDay(${i})">Day ${lesson.day}</div>`;
            });

            document.getElementById('chat-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendChat();
            });
        }

        function startDay(index) {
            selectLesson(index);
            document.getElementById('question-text').scrollIntoView({behavior: 'smooth'});
        }

        function selectLesson(i) {
            currentLesson = lessons[i];
            document.getElementById('question-text').innerText = currentLesson.questions[0].q;
        }

        function checkAnswer() {
            if(!currentLesson) return alert('Pehle lesson select karo');
            const ans = document.getElementById('answer-input').value.trim().toLowerCase();
            if(ans === currentLesson.questions[0].answer.toLowerCase()) {
                alert('Sahi Jawab! +10 XP 🔥');
                let xp = document.getElementById('xp');
                xp.innerText = parseInt(xp.innerText) + 10;
                document.getElementById('answer-input').value = '';
            } else {
                alert('Galat. Try again!');
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.getElementById('theme-toggle').innerText =
                document.body.classList.contains('light-mode')? '☀️' : '🌙';
        }

        function addHeart() {
            let hearts = document.getElementById('hearts');
            hearts.innerText = parseInt(hearts.innerText) + 1;
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            const msg = input.value.trim();
            
            if(msg === '') return;
            
            chatBox.innerHTML += `<div class="user-msg"><b>Aap:</b> ${msg}</div>`;
            
            let reply = "Maaf karo, main samjhi nahi. Grammar se related pucho.";
            const lowerMsg = msg.toLowerCase();
            
            if(lowerMsg.includes('hello') || lowerMsg.includes('hi') || lowerMsg.includes('namaste')) {
                reply = "Namaste! Kaise ho? Grammar me kya help chahiye?";
            } else if(lowerMsg.includes('noun')) {
                reply = "Noun kisi person, place, animal ya thing ka naam hota hai. Jaise: Ram, Delhi, Dog, Book";
            } else if(lowerMsg.includes('verb')) {
                reply = "Verb action ya state batata hai. Jaise: run, eat, is, are";
            } else if(lowerMsg.includes('tense')) {
                reply = "Tense 3 tarah ke hote hain: Present, Past, Future. Kaunsa sikhna hai?";
            } else if(lowerMsg.includes('pronoun')) {
                reply = "Pronoun, noun ki jagah use hota hai. Jaise: He, She, It, They";
            } else if(lowerMsg.includes('adjective')) {
                reply = "Adjective, noun ki quality batata hai. Jaise: Good boy, Big house";
            } else if(lowerMsg.includes('thank')) {
                reply = "Welcome! Aur kuch puchna hai? 😊";
            }
            
            setTimeout(() => {
                chatBox.innerHTML += `<div class="bot-msg"><b>Maya Didi:</b> ${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
