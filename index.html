<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maya Didi - English Teacher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <span>Maya Didi</span>
    <div class="stats">
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <span>🔥 <span id="streak">0</span></span>
      <span>❤️ <span id="hearts">5</span></span>
      <span>⚡ <span id="xp">0</span></span>
    </div>
  </div>

  <div class="container">
    <div class="screen" id="homeScreen">
      <button class="btn btn-voice" onclick="showDoubtScreen()">💬 Maya Didi से पूछो</button>
      <button class="btn btn-practice" onclick="startPractice()">🔄 Practice गलत Questions</button>
      <div class="card">
        <div class="grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
          <div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="streakHome">0</div></div>
          <div class="stat"><div class="stat-label">Hearts</div><div class="stat-value" id="heartsHome">5</div></div>
          <div class="stat"><div class="stat-label">XP</div><div class="stat-value" id="xpHome">0</div></div>
        </div>
        <h3>UNIT 1: BASICS - 30 DAYS</h3>
        <p style="color:var(--text2);font-size:14px;margin:8px 0">Day चुनो। Done Day पे Click = Practice</p>
        <div class="day-grid" id="daysGrid"></div>
      </div>
    </div>

    <div class="screen" id="quizScreen">
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
      <div class="card">
        <div class="question" id="questionText"></div>
        <div class="hindi" id="questionHindi"></div>
        <div class="options" id="optionsBox"></div>
        <div class="feedback" id="feedback"></div>
        <div class="grammar hidden" id="grammarBox"></div>
      </div>
      <button class="btn btn-main" id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
    </div>

    <div class="screen" id="doubtScreen">
      <div class="card">
        <h3>Maya Didi से पूछो 💬</h3>
        <div id="chatBox" style="max-height:400px;overflow-y:auto;margin:16px 0"></div>
        <input type="text" id="doubtInput" placeholder="यहाँ अपना Doubt लिखो..." style="width:100%;padding:12px;border-radius:12px;border:2px solid var(--opt);background:var(--bg);color:var(--text)">
        <button class="btn btn-voice" onclick="askDoubt()">पूछो</button>
        <button class="btn btn-speak" onclick="askDoubtVoice()">🎤 बोल के पूछो</button>
        <button class="btn btn-opt" onclick="showScreen('homeScreen')">← वापस</button>
      </div>
    </div>
  </div>

  <div class="modal" id="dayModal">
    <div class="modal-content">
      <h3 id="modalTitle"></h3>
      <p id="modalDesc"></p>
      <button class="btn btn-main" onclick="startDayQuiz()">Start Quiz</button>
      <button class="btn btn-practice" onclick="startDayPractice()" id="modalPracticeBtn">Practice गलत Questions</button>
      <button class="btn btn-opt" onclick="closeModal()">बंद करें</button>
    </div>
  </div>

  <div class="modal" id="adPopup">
    <div class="modal-content">
      <h3>😢 Hearts खत्म!</h3>
      <p>2 Hearts पाने के लिए Video देखो</p>
      <button class="btn btn-main" onclick="watchAd()">📺 Video देखो</button>
      <button class="btn btn-opt" onclick="closeAd()">बंद करें</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dayGrid.js"></script>
  <script src="js/quiz.js"></script>
  <script>
    window.onload = function(){
      loadState();
      loadDays();
      showScreen('homeScreen');
    }
  </script>
</body>
</html>
