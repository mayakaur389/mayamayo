<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maya Didi - English Learning</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <span>Maya Didi</span>
    <div class="stats">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
      <span>🔥<span id="streak">0</span></span>
      <span>❤️<span id="hearts">5</span></span>
      <span>⚡<span id="xp">0</span></span>
    </div>
  </div>

  <div class="container">
    <!-- HOME SCREEN -->
    <div class="screen" id="homeScreen">
      <button class="btn btn-voice" onclick="showDoubtScreen()">💬 Maya Didi से पूछो</button>
      <button class="btn btn-practice" onclick="startPractice()">🔄 Practice गलत Questions</button>

      <div class="card">
        <div class="grid">
          <div class="stat">
            <div class="stat-label">Streak</div>
            <div class="stat-value" id="streakHome">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Hearts</div>
            <div class="stat-value" id="heartsHome">5</div>
          </div>
          <div class="stat">
            <div class="stat-label">XP</div>
            <div class="stat-value" id="xpHome">0</div>
          </div>
        </div>

        <h3 style="margin-top:20px;margin-bottom:8px;">UNIT 1: BASICS - 30 DAYS</h3>
        <p style="color:var(--text2);margin-bottom:16px;text-align:center">Day चुनो। Done Day पे Click = Practice</p>

        <div class="day-grid" id="daysGrid"></div>
      </div>
    </div>

    <!-- DOUBT SCREEN -->
    <div class="screen" id="doubtScreen">
      <button class="btn btn-main" onclick="showScreen('homeScreen')" style="margin-bottom:16px;">← Back</button>
      <div class="card">
        <h3 style="margin-bottom:16px;">Maya Didi से पूछो 😊</h3>
        <div id="chatBox" style="max-height:400px;overflow-y:auto;margin-bottom:16px;"></div>
        <input type="text" id="doubtInput" placeholder="Apna doubt likho...">
        <button class="btn btn-main" onclick="askDoubt()">भेजो</button>
        <button class="btn btn-voice" onclick="askDoubtVoice()">🎤 बोल के पूछो</button>
      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div class="screen" id="quizScreen">
      <button class="btn btn-main" onclick="showScreen('homeScreen')" style="margin-bottom:16px;">← Back</button>
      <div class="card">
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>
        <p id="progressText" style="color:var(--text2);margin-bottom:16px;font-size:14px;">Question 1/3</p>

        <div class="question" id="questionText">Loading...</div>
        <div class="hindi" id="hindiText"></div>

        <div class="options" id="optionsBox"></div>

        <div class="feedback" id="feedback"></div>
        <div class="grammar hidden" id="grammarBox"></div>

        <button class="btn btn-main hidden" id="nextBtn" onclick="nextQuestion()">Next Question</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dayGrid.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
