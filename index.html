<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Didi - AI Teacher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-title">Maya Didi</div>
        <div class="stats">
            <span>🔥<span id="streak">11</span></span>
            <span>❤️<span id="hearts">1</span></span>
            <span>⚡<span id="xp">260</span></span>
        </div>
    </div>

    <div class="container">
        <!-- 1. Maya Didi se Baate Karo -->
        <div class="section">
            <button class="btn" onclick="goToChat()">💬 Maya Didi se Baate Karo</button>
        </div>

        <!-- 2. Practice -->
        <div class="section">
            <h3>📝 Practice Karo</h3>
            <div id="practice-list"></div>
        </div>

        <!-- 3. Maya Didi ke sath Grammar Sikho -->
        <div class="section">
            <h3>📚 Maya Didi ke sath Grammar Sikho</h3>
            <button class="btn btn-green" onclick="alert('Tenses jaldi add hoga')">Tenses</button>
            <button class="btn btn-green" onclick="alert('Verbs jaldi add hoga')">Verbs</button>
        </div>
    </div>

    <script src="lessons.js"></script>
    <script>
        function goToChat() {
            window.location.href = 'ai-teacher.html';
        }

        // Day 1, Day 2 ke button lessons.js se bharo
        window.onload = function() {
            const list = document.getElementById('practice-list');
            lessons.forEach((lesson, i) => {
                list.innerHTML += `<div class="day-btn" onclick="alert('${lesson.title} Start!')">Day ${i+1}: ${lesson.title}</div>`;
            });
        }
    </script>
</body>
</html>
