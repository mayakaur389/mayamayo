<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Didi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="header">
    <div class="header-title">Maya Didi</div>
    <div class="stats">
        <span id="theme-toggle" onclick="toggleTheme()">🌙</span>
        <span>🔥<span id="streak">11</span></span>
        <span onclick="addHeart()">❤️<span id="hearts">1</span></span>
        <span>⚡<span id="xp">260</span></span>
    </div>
</div> 

    <div class="container">
        <button class="btn-purple" onclick="location.href='ai-teacher.html'">💬 Maya didi se puchho</button>
        <button class="btn-yellow" onclick="alert('Practice Day 1 jaldi aayega')">📝 Practice Shuru Karo</button>
<!-- Day Wale Gol Button -->
<div class="section" style="background:transparent;padding:0;">
    <h3 style="color:#e0e0e0;margin:16px 0 8px 0;">📅 Daily Practice</h3>
    <div class="day-circle-container" id="day-buttons"></div>
</div>
        <div class="card">
            <h3>Maya Didi ke Saath Grammar Seekho 📚</h3>
            <p>Roz 1 naya topic + Quiz</p>
            <div id="lesson-list"></div>
            
            <div style="margin-top:16px;">
                <div id="question-text" style="border:2px solid #1a73e8;padding:16px;border-radius:8px;min-height:60px;margin-bottom:8px;">Lesson select karo</div>
                <input type="text" class="input-box" id="answer-input" placeholder="Answer likho">
                <button class="btn-green" onclick="checkAnswer()">Bhejo</button>
            </div>
        </div>
    </div>

    <script src="lessons.js"></script>
<script>
    let currentLesson = '';

    window.onload = function() {
        const list = document.getElementById('lesson-list');
        const dayContainer = document.getElementById('day-buttons');

        lessons.forEach((lesson, i) => {
            // Grammar List
            list.innerHTML += `<button class="btn-blue" onclick="selectLesson(${i})">Lesson ${i+1}: ${lesson.title}</button>`;

            // Gol Day Button
            dayContainer.innerHTML += `<div class="day-circle" onclick="startDay(${i})">Day ${lesson.day}</div>`;
        });
    }

    function startDay(index) {
        selectLesson(index);
        document.getElementById('question-text').scrollIntoView({behavior: 'smooth'});
    }

    function selectLesson(i) {
        currentLesson = lessons[i];
        document.getElementById('question-text').innerText = currentLesson.questions[0].q;
    }

    function checkAnswer() {
        if(!currentLesson) return alert('Pehle lesson select karo');
        const ans = document.getElementById('answer-input').value.trim().toLowerCase();
        if(ans === currentLesson.questions[0].answer.toLowerCase()) {
            alert('Sahi Jawab! +10 XP 🔥');
            let xp = document.getElementById('xp');
            xp.innerText = parseInt(xp.innerText) + 10;
            document.getElementById('answer-input').value = '';
        } else {
            alert('Galat. Try again!');
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        document.getElementById('theme-toggle').innerText =
            document.body.classList.contains('light-mode')? '☀️' : '🌙';
    }

    function addHeart() {
        let hearts = document.getElementById('hearts');
        hearts.innerText = parseInt(hearts.innerText) + 1;
    }
</script>
</body>
</html>
