<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Didi Grammar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding-bottom: 20px;
        }

       .header {
            background: #1a73e8; padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
       .header-title { font-size: 20px; font-weight: 600; }
       .stats { display: flex; gap: 12px; font-size: 16px; }
       .stats span { cursor: pointer; }

       .top-buttons { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
       .btn-purple {
            background: #8B5CF6; color: white; border: none; padding: 16px;
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
       .btn-yellow {
            background: #FBBF24; color: #000; border: none; padding: 16px;
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

       .card {
            background: #fff; color: #000; margin: 0 16px;
            padding: 20px; border-radius: 16px;
        }
       .card h2 { color: #1a73e8; font-size: 20px; margin-bottom: 4px; }
       .card p { color: #666; font-size: 14px; margin-bottom: 16px; }

       .day-section {
            background: #1e293b; margin: 0 16px 16px 16px;
            padding: 20px; border-radius: 16px;
        }
       .day-section h3 { color: #fff; font-size: 18px; margin-bottom: 4px; }
       .day-section p { color: #94a3b8; font-size: 14px; margin-bottom: 16px; }
       .day-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 12px; margin-top: 16px;
        }

       .day-btn {
            aspect-ratio: 1; border-radius: 50%; border: none;
            font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; transition: transform 0.2s;
        }
       .day-btn:active { transform: scale(0.9); }

       .day-completed { background: #10B981; color: white; }
       .day-current { background: #3B82F6; color: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
       .day-locked { background: #334155; color: #64748b; cursor: not-allowed; }
       .day-icon { font-size: 16px; line-height: 1; }
       .day-text { font-size: 10px; margin-top: 2px; }

       .btn-blue {
            background: #1a73e8; color: white; border: none; width: 100%;
            padding: 14px; border-radius: 10px; font-size: 15px;
            font-weight: 600; margin: 8px 0; cursor: pointer;
        }

       .input-box {
            width: 100%; padding: 14px; border: 2px solid #1a73e8;
            border-radius: 10px; font-size: 15px; margin: 8px 0; outline: none;
        }

       .btn-green {
            background: #10B981; color: white; border: none; padding: 12px 28px;
            border-radius: 10px; font-size: 15px; font-weight: 600;
            cursor: pointer; float: right; margin-top: 8px;
        }

        #progress-text { text-align: center; color: #666; margin: 12px 0; font-weight: 600; }
       .completed-msg {
            background: #10B981; color: white; padding: 12px;
            border-radius: 10px; text-align: center; margin: 12px 0; font-weight: 600;
        }

        #chat-container {
            display: none; background: #f5f5f5; border-radius: 10px;
            padding: 12px; margin: 12px 0; max-height: 300px; overflow-y: auto;
        }
       .bot-msg {
            background: #1a73e8; color: white; padding: 10px;
            border-radius: 8px; margin: 6px 0; max-width: 85%;
        }
       .user-msg {
            background: #e0e0e0; color: #000; padding: 10px;
            border-radius: 8px; margin: 6px 0; max-width: 85%;
            margin-left: auto; text-align: right;
        }

        body.light-mode { background: #f5f5f5; }
        body.light-mode.card { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        body.light-mode.day-section { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        body.light-mode.day-section h3 { color: #000; }
        body.light-mode.day-section p { color: #666; }
        body.light-mode #chat-container { background: #fff; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">Maya Didi</div>
        <div class="stats">
            <span id="theme-toggle" onclick="toggleTheme()">☀️</span>
            <span>🔥<span id="streak">11</span></span>
            <span onclick="addHeart()">❤️<span id="hearts">1</span></span>
            <span>⚡<span id="xp">260</span></span>
            <span onclick="toggleTheme()">🌙</span>
        </div>
    </div>

    <div class="top-buttons">
        <button class="btn-purple" onclick="openChat()">
            💬 Maya se Gupshup Karo
        </button>
        <button class="btn-yellow" onclick="startPracticeMode()">
            📝 Practice Shuru Karo
        </button>
    </div>

    <div class="day-section">
        <h3>UNIT 1: BASICS - 30 DAYS</h3>
        <p>Day chuno aur seekhna shuru karo</p>
        <div class="day-grid" id="day-grid"></div>
    </div>

    <div class="card">
        <h2>Maya ke Saath Grammar + Quiz 📚</h2>
        <p>Day-wise seekho, Maya se gupshup karo, Practice karo</p>

        <div id="progress-text"></div>
        <div id="lesson-container"></div>

        <div id="question-section" style="display:none;">
    <input type="text" id="question-text" class="input-box" readonly>
    <div style="display:flex; gap:8px; margin:8px 0;">
        <input type="text" id="answer-input" class="input-box" placeholder="Answer likho yaar" style="margin:0; flex:1;">
        <button id="mic-btn" class="mic-btn" onclick="startQuizListening()" title="Bol ke answer do">🎙️</button>
    </div>
    <button class="btn-green" onclick="checkAnswer()">Bhejo</button>
    <div id="mic-status" style="text-align:center; color:#10B981; font-size:12px; margin-top:8px; display:none;">🎤 Sun raha hun... Bolo</div>
    <div style="clear:both"></div>
</div>

        <div id="completed-section"></div>

        <div id="chat-container">
    <div id="chat-box"></div>
    <div style="display:flex; gap:8px; margin-top:12px;">
        <input type="text" id="chat-input" class="input-box" placeholder="Maya se pucho..." style="margin:0; flex:1;">
        <button id="mic-btn-chat" class="mic-btn" onclick="startMayaListening()">🎙️</button>
    </div>
    <button class="btn-green" onclick="sendChat()" style="margin-top:8px; width:100%;">Bhejo</button>
    <div id="mic-status-chat" style="text-align:center; color:#10B981; font-size:12px; margin-top:8px; display:none;">🎤 Sun raha hun... Bolo</div>
</div>
    </div>

    <script src="lessons.js"></script>
    <script>
        // <-- YAHAN CHANGE KIYA: localStorage se data load karo
        let currentLessonIndex = parseInt(localStorage.getItem('currentLessonIndex')) || 0;
        let currentQuestionIndex = 0;
        let wrongAnswers = JSON.parse(localStorage.getItem('wrongAnswers')) || [];
        let practiceMode = false;
        let chatOpen = false;
        let completedDays = JSON.parse(localStorage.getItem('completedDays')) || [];

        // <-- YAHAN CHANGE KIYA: Save karne ka function
        function saveProgress() {
            localStorage.setItem('currentLessonIndex', currentLessonIndex);
            localStorage.setItem('completedDays', JSON.stringify(completedDays));
            localStorage.setItem('wrongAnswers', JSON.stringify(wrongAnswers));
            localStorage.setItem('xp', document.getElementById('xp').innerText);
            localStorage.setItem('streak', document.getElementById('streak').innerText);
            localStorage.setItem('hearts', document.getElementById('hearts').innerText);
        }

        window.onload = function() {
            if(typeof lessons === 'undefined') {
                alert('Error: lessons.js load nahi hua');
                return;
            }

            // <-- YAHAN CHANGE KIYA: Saved XP, Streak, Hearts load karo
            document.getElementById('xp').innerText = localStorage.getItem('xp') || '260';
            document.getElementById('streak').innerText = localStorage.getItem('streak') || '11';
            document.getElementById('hearts').innerText = localStorage.getItem('hearts') || '1';

            renderDayGrid();
            showCurrentLesson();

            document.getElementById('chat-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendChat();
            });
            document.getElementById('answer-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') checkAnswer();
            });
        }

        function renderDayGrid() {
            const grid = document.getElementById('day-grid');
            grid.innerHTML = '';

            for(let i = 0; i < 30; i++) {
                const dayNum = i + 1;
                const btn = document.createElement('button');
                btn.className = 'day-btn';

                if(completedDays.includes(dayNum)) {
                    btn.className += ' day-completed';
                    btn.innerHTML = `<div class="day-icon">${dayNum}</div><div class="day-text">✓</div>`;
                    btn.onclick = () => alert('Ye day complete ho chuka hai! 🎉');
                } else if(dayNum === currentLessonIndex + 1) {
                    btn.className += ' day-current';
                    btn.innerHTML = `<div class="day-icon">${dayNum}</div><div class="day-text">Start</div>`;
                    btn.onclick = () => startLessonFromDay(dayNum - 1);
                } else if(dayNum <= lessons.length) {
                    btn.className += ' day-locked';
                    btn.innerHTML = `<div class="day-icon">${dayNum}</div><div class="day-text">🔒</div>`;
                    btn.onclick = () => alert('Pehle Day ' + (currentLessonIndex + 1) + ' complete karo yaar! 😎');
                } else {
                    btn.className += ' day-locked';
                    btn.innerHTML = `<div class="day-icon">${dayNum}</div><div class="day-text">🔒</div>`;
                    btn.onclick = () => alert('Ye day abhi available nahi hai!');
                }
                grid.appendChild(btn);
            }
        }

        function startLessonFromDay(index) {
            if(index!== currentLessonIndex) {
                alert('Pehle current day complete karo!');
                return;
            }
            startLesson();
        }

        function showCurrentLesson() {
            const container = document.getElementById('lesson-container');
            const progressText = document.getElementById('progress-text');

            if(currentLessonIndex >= lessons.length) {
                container.innerHTML = `<div class="completed-msg">🎉 Arre waah! Sab Lessons khatam! Tu toh topper nikla re 😎</div>`;
                document.getElementById('question-section').style.display = 'none';
                progressText.innerText = '';
                return;
            }

            const lesson = lessons[currentLessonIndex];
            progressText.innerText = `Lesson ${lesson.day} of ${lessons.length}`;
            container.innerHTML = '';
        }

        function startLesson() {
            practiceMode = false;
            currentQuestionIndex = 0;
            const lesson = lessons[currentLessonIndex];
            document.getElementById('question-section').style.display = 'block';
            document.getElementById('question-text').value = lesson.questions[0].q;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
            document.getElementById('question-section').scrollIntoView({behavior: 'smooth'});
        }

        function checkAnswer() {
            const ans = document.getElementById('answer-input').value.trim().toLowerCase();
            if(ans === '') return alert('Arre likh toh sahi pehle 😂');

            const lesson = practiceMode? wrongAnswers[0].lesson : lessons[currentLessonIndex];
            const question = practiceMode? wrongAnswers[0].question : lesson.questions[currentQuestionIndex];

            if(ans === question.answer.toLowerCase()) {
                alert('Shi baat! Ekdum correct 🔥 +10 XP milega tujhe');
                let xp = document.getElementById('xp');
                xp.innerText = parseInt(xp.innerText) + 10;
                saveProgress(); // <-- YAHAN CHANGE KIYA: XP save karo

                if(practiceMode) {
                    wrongAnswers.shift();
                    saveProgress(); // <-- YAHAN CHANGE KIYA: Wrong answers update save karo
                    if(wrongAnswers.length === 0) {
                        alert('Bas ho gaya practice! Tu toh master nikla 🎉');
                        document.getElementById('question-section').style.display = 'none';
                        return;
                    }
                    document.getElementById('question-text').value = wrongAnswers[0].question.q;
                } else {
                    currentQuestionIndex++;
                    if(currentQuestionIndex >= lesson.questions.length) {
                        completedDays.push(lesson.day);
                        saveProgress(); // <-- YAHAN CHANGE KIYA: Day complete save karo
                        document.getElementById('completed-section').innerHTML =
                            `<div class="completed-msg">✅ Day ${lesson.day} Done! Aag laga di bhai 🔥</div>`;

                        setTimeout(() => {
                            currentLessonIndex++;
                            saveProgress(); // <-- YAHAN CHANGE KIYA: Next day save karo
                            currentQuestionIndex = 0;
                            document.getElementById('question-section').style.display = 'none';
                            document.getElementById('completed-section').innerHTML = '';
                            renderDayGrid();
                            showCurrentLesson();
                        }, 1500);
                    } else {
                        document.getElementById('question-text').value = lesson.questions[currentQuestionIndex].q;
                    }
                }
                document.getElementById('answer-input').value = '';
            } else {
                alert('Galat ho gaya yaar 😅 Koi na, fir se try kar!');
                if(!practiceMode) {
                    wrongAnswers.push({ lesson: lesson, question: question });
                    saveProgress(); // <-- YAHAN CHANGE KIYA: Galat answer save karo
                }
            }
        }

        function startPracticeMode() {
            if(wrongAnswers.length === 0) {
                alert('Abhi tak ek bhi galti nahi? Kya baat hai! Pehle lesson kar le phir aana 😎');
                return;
            }
            practiceMode = true;
            document.getElementById('question-section').style.display = 'block';
            document.getElementById('question-text').value = wrongAnswers[0].question.q;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
            document.getElementById('progress-text').innerText = `Practice Mode: ${wrongAnswers.length} Questions bache hain`;
            document.getElementById('question-section').scrollIntoView({behavior: 'smooth'});
        }

        function openChat() {
            chatOpen =!chatOpen;
            const container = document.getElementById('chat-container');
            const chatBox = document.getElementById('chat-box');
            container.style.display = chatOpen? 'block' : 'none';

            if(chatOpen && chatBox.innerHTML === '') {
                chatBox.innerHTML = `<div class="bot-msg"><b>Maya:</b> Heyy! Kya haal hai? 😄 Main Maya hun - teri Grammar wali dost! Padhai karni hai ya bas timepass? Kuch bhi puch le grammar ka 🤪</div>`;
            }
            if(chatOpen) container.scrollIntoView({behavior: 'smooth'});
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            const msg = input.value.trim();

            if(msg === '') return;

            chatBox.innerHTML += `<div class="user-msg"><b>Tu:</b> ${msg}</div>`;

            let reply = getFriendlyMayaReply(msg);

            setTimeout(() => {
                chatBox.innerHTML += `<div class="bot-msg"><b>Maya:</b> ${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 600);

            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function getFriendlyMayaReply(msg) {
            const lowerMsg = msg.toLowerCase();
            if(lowerMsg.match(/^(hi|hello|hey|hii|heyy)$/)) {
                return "Heyyy! Kya haal hai? 😎\nHeyyy! How are you? Main Maya hun - teri English wali dost. Padhai karni hai ya bas timepass? Ask me anything about English!";
            }
            if(lowerMsg.includes('kaise ho') || lowerMsg.includes('kya haal') || lowerMsg.includes('how are you')) {
                return "Main toh ekdum badiya hun yaar! Tu suna? 😄\nI'm doing great yaar! What about you? Padhai ho rahi hai ya phone me hi ghusa hai? 😂 Chal English ka koi doubt hai toh puch!";
            }
            if(lowerMsg.includes('kya kar') || lowerMsg.includes('what are you doing')) {
                return "Bas tere jaise smart students ka wait kar rahi thi 😏\nJust waiting for smart students like you. Tu bata kya kar raha hai? Grammar, Vocab, ya Spoken English practice?";
            }
            if(lowerMsg.includes('bore') || lowerMsg.includes('boring')) {
                return "Bore ho raha hai? Chal ek game khelte hain 😂\nGetting bored? Let's play a game. Main ek word bolungi, tu uska opposite bata. Ready? Word: 'Happy'. Bata opposite!";
            }
            if(lowerMsg.includes('noun')) {
                return "Noun yaani 'Naam' 😎 Person, Place, Animal, Thing ka naam. Jaise: Virat Kohli, Mumbai, Tiger, Mobile.\nNoun means 'Name' - name of person, place, animal or thing. Ex: 'Virat plays in Mumbai' - Virat & Mumbai are nouns. Samjha? Want more examples?";
            }
            if(lowerMsg.includes('verb')) {
                return "Verb matlab 'Kaam/Action' 💪 Jo ho raha hai. Jaise: khana, sona, padhna, khelna.\nVerb means 'Action'. Ex: 'I am eating' - 'eating' is verb. Tu abhi kya kar raha hai? Tell me in English!";
            }
            if(lowerMsg.includes('tense')) {
                return "Tense = Time ⏰ 3 main types: 1) Present - Abhi: I eat 2) Past - Pehle: I ate 3) Future - Baad me: I will eat.\nTense tells time of action. Present = now, Past = before, Future = later. Kaunsa tense detail me chahiye? Present, Past ya Future?";
            }
            if(lowerMsg.includes('pronoun')) {
                return "Pronoun = Noun ka duplicate 😂 He, She, It, They. 'Ram is smart. He studies' - yahan 'He' ne Ram ki jagah le li.\nPronoun replaces noun to avoid repetition. Ex: Instead of 'Ram Ram', we say 'Ram...he'. Clear? Aur example du?";
            }
            if(lowerMsg.includes('adjective')) {
                return "Adjective = Noun ki tareef 🏆 Good boy, Beautiful girl, Tasty food.\nAdjective describes noun. 'Smart boy' - smart is adjective. Ab tu apni tareef kar 3 adjectives se! 😏";
            }
            if(lowerMsg.includes('adverb')) {
                return "Adverb = Verb/Adjective ki tareef 😎 He runs fast, Very beautiful. Mostly 'ly' se end: quickly, slowly.\nAdverb tells how/when/where action happens. 'She sings beautifully' - beautifully is adverb. Got it?";
            }
            if(lowerMsg.includes('preposition')) {
                return "Preposition = Relation banane wala rishtedaar 😂 in, on, at, under. 'Book table pe hai' = Book is on the table.\nPreposition shows relation between words. 'I am in school' - 'in' shows place. Easy na?";
            }
            if(lowerMsg.includes('article')) {
                return "Article = 3 hi hain: A, An, The. 'A' consonant se pehle - a book. 'An' vowel se pehle - an apple. 'The' specific ke liye - the moon.\nArticles are A, An, The. Use 'an' before vowel sound. Ex: an hour (h silent hai). Samjha?";
            }
            if(lowerMsg.includes('active') || lowerMsg.includes('passive')) {
                return "Active: 'Ram ne momo khaya' - Ram ne action kiya 💪 Passive: 'Momo Ram se khaya gaya' - Momo bechara 😂\nActive: Subject does action. Passive: Subject receives action. Formula: Object + is/was + V3 + by + Subject. Try karo: 'Maya ne tujhe samjhaya' ka passive?";
            }
            if(lowerMsg.includes('direct') || lowerMsg.includes('indirect')) {
                return "Direct: He said, 'I am happy'. Indirect: He said that he was happy. Present→Past, I→he.\nDirect = exact words. Indirect = reported words. Rules: am→was, today→that day. Aur example chahiye?";
            }
            if(lowerMsg.includes('vocab') || lowerMsg.includes('word') || lowerMsg.includes('meaning')) {
                return "Vocab seekhna hai? Great! 😎 Roz 5 new words sikho. Aaj ka word: 'Brilliant' = Bahut smart/tezz. Use: 'You are brilliant!'\nWant to learn vocabulary? Great! Today's word: 'Brilliant' means very smart. Make a sentence with 'Brilliant' and send me!";
            }
            if(lowerMsg.includes('translate') || lowerMsg.includes('hindi to english') || lowerMsg.includes('english to hindi')) {
                return "Translation chahiye? Bhej de sentence! 😄\nNeed translation? Send me the sentence! Example: 'Main school jata hun' = 'I go to school'. Ab tu bhej!";
            }
            if(lowerMsg.includes('sentence') || lowerMsg.includes('ban') || lowerMsg.includes('make')) {
                return "Sentence banana hai? Easy! 😎 Structure: Subject + Verb + Object. Ex: 'Ram eats mango'.\nWant to make sentences? Use: Subject + Verb + Object. Try making one with 'play' and send me!";
            }
            if(lowerMsg.includes('essay') || lowerMsg.includes('paragraph') || lowerMsg.includes('write')) {
                return "Essay likhna hai? Topic bata! 😄 Main points de dungi, tu likh lena.\nWant to write essay? Tell me topic! I'll give you main points. Ex: 'My School' - 1) Name 2) Teachers 3) Friends. Topic kya hai?";
            }
            if(lowerMsg.includes('spoken') || lowerMsg.includes('speak') || lowerMsg.includes('bolna')) {
                return "Spoken English practice? Best idea! 😎 Roz 5 sentences bol. Start karo: 'My name is ___'.\nWant to speak English? Practice 5 sentences daily. Start with: 'I am learning English with Maya'. Bol ke dikhao!";
            }
            if(lowerMsg.includes('nahi aata') || lowerMsg.includes('difficult') || lowerMsg.includes('hard') || lowerMsg.includes('mushkil')) {
                return "Arre mushkil kuch nahi hota yaar! 😎 Tu Reels scroll karna seekh gaya, ye English kya cheez hai? Main hun na!\nNothing is difficult yaar! If you learned to use phone, you can learn English too. I'm here! Bas practice karta reh. Kya samajh nahi aa raha?";
            }
            if(lowerMsg.includes('thank') || lowerMsg.includes('thanks')) {
                return "Arre thanks rehne de yaar! 😄 Tu seekh gaya na, wahi party hai mere liye 🎉\nNo thanks needed yaar! If you learned something, that's my party 🎉 Ask more if you have doubts!";
            }
            if(lowerMsg.includes('love') || lowerMsg.includes('pyar') || lowerMsg.includes('gf') || lowerMsg.includes('bf')) {
                return "Arre pyar-vyaar chhod 😂 Pehle English se pyar kar le! Exam me top karega tab asli maza aayega.\nForget love for now 😂 First fall in love with English! You'll top in exams then. Chal ab bata 'Love' kaun sa part of speech hai? Noun bhi, Verb bhi!";
            }
            const defaultReplies = [
                `Haha tu '${msg}' bol raha hai? 😂 Chal chhod ye sab, English pe aate hain. Kya doubt hai bata?\nHaha you're saying '${msg}'? 😂 Leave that, let's focus on English. What's your doubt?`,
                `Oye hoye! '${msg}' 😏 Itna dimag English me laga deta toh topper ban jaata! Chal puch kya puchna hai?\nOye hoye! '${msg}' 😏 If you used this much brain in English you'd be topper! Ask me anything about English.`,
                `Samjhi nahi properly par koi na 😄 Tu Grammar, Vocab, Translation, Spoken kuch bhi puch le. Main example deke samjha dungi!\nDidn't understand properly but no problem 😄 Ask me Grammar, Vocab, Translation or Spoken English. I'll explain with examples!`,
                `Arre yaar tu toh bada curious hai! 😂 Main English wali Maya hun - Grammar, Words, Sentences, Essay sab me help karungi. Bas topic bata!\nArre yaar you're very curious! 😂 I'm English Maya - I help with Grammar, Words, Sentences, Essays. Just tell me the topic!`
            ];
            return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-toggle');
            icon.innerText = document.body.classList.contains('light-mode')? '🌙' : '☀️';
        }

        function addHeart() {
            let hearts = document.getElementById('hearts');
            hearts.innerText = parseInt(hearts.innerText) + 1;
            saveProgress(); // <-- YAHAN CHANGE KIYA: Heart save karo
        }
            // <-- YAHAN NAYA: Mic Feature for Quiz
    let recognition;
    let isListening = false;

    function startQuizListening() {
        // Check browser support
        if (!('webkitSpeechRecognition' in window) &&!('SpeechRecognition' in window)) {
            alert('Arre yaar! Tera browser mic support nahi karta 😅 Chrome use kar');
            return;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // English sunega
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        const micBtn = document.getElementById('mic-btn');
        const micStatus = document.getElementById('mic-status');
        const answerInput = document.getElementById('answer-input');

        if (isListening) {
            recognition.stop();
            return;
        }

        // Start listening
        recognition.start();
        isListening = true;
        micBtn.classList.add('listening');
        micBtn.innerText = '⏹️';
        micStatus.style.display = 'block';
        answerInput.placeholder = 'Bol rahe ho...';

        recognition.onresult = function(event) {
            const speechResult = event.results[0][0].transcript;
            answerInput.value = speechResult.trim();
            answerInput.placeholder = 'Answer likho yaar';
            stopListening();
        };

        recognition.onerror = function(event) {
            console.log('Mic Error:', event.error);
            if(event.error === 'no-speech') {
                alert('Kuch bola nahi tune 😅 Phir se try kar');
            } else if(event.error === 'not-allowed') {
                alert('Mic permission de bhai! Browser me allow kar');
            }
            stopListening();
        };

        recognition.onend = function() {
            stopListening();
        };
    }

    function stopListening() {
        isListening = false;
        const micBtn = document.getElementById('mic-btn');
        const micStatus = document.getElementById('mic-status');
        micBtn.classList.remove('listening');
        micBtn.innerText = '🎙️';
        micStatus.style.display = 'none';
        document.getElementById('answer-input').placeholder = 'Answer likho yaar';
        if(recognition) recognition.stop();
    }
    </script>
</body>
</html>
